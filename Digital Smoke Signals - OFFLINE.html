olor:#C9BEDA;\">Heard even <span style=\"color:#ECE6F4;\">below the background hiss<\u002Fspan> — that's the range.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;background:#150E26;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:34px 38px;display:flex;flex-direction:column;\">\n      <div style=\"font-family:'Chakra Petch',sans-serif;font-size:36px;color:#FF8A3D;margin-bottom:14px;\">Shrugs off chaos<\u002Fdiv>\n      <div style=\"font-size:27px;line-height:1.4;color:#C9BEDA;\">Interference, reflections, a moving crowd — the sweep stays <span style=\"color:#ECE6F4;\">recognisable<\u002Fspan>.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;background:#150E26;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:34px 38px;display:flex;flex-direction:column;\">\n      <div style=\"font-family:'Chakra Petch',sans-serif;font-size:36px;color:#C96BFF;margin-bottom:14px;\">Nature's trick<\u002Fdiv>\n      <div style=\"font-size:27px;line-height:1.4;color:#C9BEDA;\"><span style=\"color:#ECE6F4;\">Bats and radar<\u002Fspan> use the same trick.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"254 Kilometres\" data-screen-label=\"14 Fact\" data-speaker-notes=\"A punchy palate-cleanser right after the chirp explanation — the chirp is the how, this number is the proof. Let the big number do the work, don't rush past it. 254 kilometres is a real Meshtastic single-hop record: two of these tiny radios talking directly, no repeaters in between, mountaintop to mountaintop across the Canada/US border. Be honest about what it means: it needs clear line of sight and ideal conditions — it's not what you'll get in a crowd — but it shows the raw reach of a coin-cell radio. Then reconnect to the theme: you almost never need one heroic 254 km shot; you chain many modest hops into a mesh so no single device needs line of sight to a mountain. Distance handled by teamwork, not brute force.\" style=\"box-sizing:border-box;padding:80px 110px;background:#9DE84B;color:#0E0A18;font-family:'Space Grotesk',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;overflow:hidden;position:relative;\">\n  <div style=\"font-family:'Space Mono',monospace;font-size:26px;letter-spacing:6px;text-transform:uppercase;opacity:0.7;margin-bottom:28px;\">// TRUE STORY<\u002Fdiv>\n  <div style=\"font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:260px;line-height:0.9;\">254<span style=\"font-size:120px;\">km<\u002Fspan><\u002Fdiv>\n  <p style=\"font-size:42px;line-height:1.4;max-width:1300px;margin:36px 0 0;font-weight:500;\">The current Meshtastic range record for just <span style=\"text-decoration:underline;\">one<\u002Fspan> of these radios shouting directly to another. Mountain to mountain, a clear view between them, one hop.<\u002Fp>\n  <p style=\"font-family:'Space Mono',monospace;font-size:28px;margin:30px 0 0;opacity:0.75;\">Now imagine chaining a bunch of them together. That's the mesh part.<\u002Fp>\n  <p style=\"font-family:'Space Mono',monospace;font-size:20px;margin:24px 0 0;opacity:0.5;\">Source: Meshtastic community range record, Canada/U.S. border.<\u002Fp>\n<\u002Fsection>\n\n\n<section data-label=\"The Hardware\" data-screen-label=\"15 Hardware\" data-speaker-notes=\"Deflate any 'this sounds expensive/complicated' worry. A ready-to-go board — LilyGo T-Beam or Heltec V3 are the popular ones — is roughly €25–40, about the price of a festival meal or two. The whole shopping list is tiny: the board, a battery (any USB power bank or 18650 works), an antenna (usually included), and a phone you already own. No soldering required to start. Mention you'll pass real units around at the table afterwards so people can feel how small and unintimidating it is — physical props sell this better than any slide.\" style=\"box-sizing:border-box;padding:80px 110px 70px;background:#0E0A18;color:#ECE6F4;font-family:'Space Grotesk',sans-serif;display:flex;flex-direction:column;overflow:hidden;\">\n  <div style=\"font-family:'Space Mono',monospace;font-size:24px;letter-spacing:4px;color:#9DE84B;margin-bottom:20px;\">// 15 · THE GEAR<\u002Fdiv>\n  <h2 style=\"font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:72px;line-height:1.0;margin:0;\">€30 and you're on the air<\u002Fh2>\n  <p style=\"font-size:34px;line-height:1.4;color:#C9BEDA;margin:26px 0 0;max-width:1300px;\">This is all you need. Smaller than a pack of cards, cheaper than a round of festival beers.<\u002Fp>\n  <div style=\"display:flex;gap:28px;margin-top:44px;flex:1;\">\n    <div style=\"flex:1;display:flex;flex-direction:column;\">\n      <div style=\"height:300px;position:relative;border:1px solid rgba(255,255,255,.1);border-radius:16px;overflow:hidden;\"><x-import component-from-global-scope=\"image-slot\" from=\"4f15e0b1-38a5-4457-bd20-0e21235dbb58#/image-slot.js\" id=\"hardware-tbeam\" shape=\"rect\" placeholder=\"Drop photo: module + antenna\" hint-size=\"100%,100%\" style=\"position:absolute;inset:0;\" src=\"uploads/hardware-tbeam.webp\"><\u002Fx-import><\u002Fdiv>\n      <div style=\"font-family:'Chakra Petch',sans-serif;font-size:38px;color:#9DE84B;margin-top:22px;\">Module &amp; Antenna<\u002Fdiv>\n      <div style=\"font-size:28px;color:#C9BEDA;margin-top:8px;line-height:1.35;\">A small board with the radio chip, plus an antenna for range. Plenty of makers sell one.<\u002Fdiv>\n      <div style=\"font-family:'Space Mono',monospace;font-size:26px;color:#FF8A3D;margin-top:14px;\">~ €35<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;display:flex;flex-direction:column;\">\n      <div style=\"height:300px;position:relative;border:1px solid rgba(255,255,255,.1);border-radius:16px;overflow:hidden;\"><x-import component-from-global-scope=\"image-slot\" from=\"4f15e0b1-38a5-4457-bd20-0e21235dbb58#/image-slot.js\" id=\"hardware-solar\" shape=\"rect\" placeholder=\"Drop photo: solar panel + MPPT\" hint-size=\"100%,100%\" style=\"position:absolute;inset:0;\" src=\"uploads/hardware-solar.webp\"><\u002Fx-import><\u002Fdiv>\n      <div style=\"font-family:'Chakra Petch',sans-serif;font-size:38px;color:#4FD6FF;margin-top:22px;\">Solar Panel + Charger<\u002Fdiv>\n      <div style=\"font-size:28px;color:#C9BEDA;margin-top:8px;line-height:1.35;\">A small panel with a charge controller keeps it running indefinitely, no plug needed.<\u002Fdiv>\n      <div style=\"font-family:'Space Mono',monospace;font-size:26px;color:#FF8A3D;margin-top:14px;\">~ €20<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;display:flex;flex-direction:column;\">\n      <div style=\"height:300px;position:relative;border:1px solid rgba(255,255,255,.1);border-radius:16px;overflow:hidden;\"><x-import component-from-global-scope=\"image-slot\" from=\"4f15e0b1-38a5-4457-bd20-0e21235dbb58#/image-slot.js\" id=\"hardware-antenna\" shape=\"rect\" placeholder=\"Drop photo: battery + charger\" hint-size=\"100%,100%\" style=\"position:absolute;inset:0;\" src=\"uploads/hardware-antenna.webp\"><\u002Fx-import><\u002Fdiv>\n      <div style=\"font-family:'Chakra Petch',sans-serif;font-size:38px;color:#C96BFF;margin-top:22px;\">Battery<\u002Fdiv>\n      <div style=\"font-size:28px;color:#C9BEDA;margin-top:8px;line-height:1.35;\">Any USB power bank or 18650 battery keeps it running for days.<\u002Fdiv>\n      <div style=\"font-family:'Space Mono',monospace;font-size:26px;color:#FF8A3D;margin-top:14px;\">~ €10<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Choosing Your Chip\" data-screen-label=\"16 MCU LoRa\" data-speaker-notes=\"This is the one nerdy slide — pitch it to the buyers who'll shop online later; everyone else can just hear 'ESP32 + SX1262'. Two independent choices on any board. First the brain (microcontroller): ESP32 is the sweet spot — cheap, Wi-Fi/Bluetooth built in, biggest community and best docs, what most boards ship with; nRF52 (RAK4631, Heltec T114) sips far less power if multi-week battery life matters. Second the radio chip: buy the current-generation SX1262 — lower power, better sensitivity, what new boards ship with; older SX127x boards still work fine but waste power for the same range. (If asked: STM32 ready-made units like the Seeed T1000-E exist too, but ESP32 is the starting point.) THE takeaway to repeat out loud: when you buy a cheap module, just make sure it's current-generation — ESP32 with an SX1262 is the safe all-rounder.\" style=\"box-sizing:border-box;padding:80px 110px 70px;background:#0E0A18;color:#ECE6F4;font-family:'Space Grotesk',sans-serif;display:flex;flex-direction:column;overflow:hidden;\">\n  <div style=\"font-family:'Space Mono',monospace;font-size:24px;letter-spacing:4px;color:#9DE84B;margin-bottom:20px;\">// 16 · CHOOSING YOUR CHIP<\u002Fdiv>\n  <h2 style=\"font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:72px;line-height:1.0;margin:0;\">Buy the current generation<\u002Fh2>\n  <p style=\"font-size:32px;line-height:1.4;color:#9A8BB2;margin:22px 0 0;max-width:1400px;\">Cheap modules are everywhere. One rule: <span style=\"color:#9DE84B;\">ESP32 + SX1262.<\u002Fspan><\u002Fp>\n  <div style=\"display:flex;gap:36px;margin-top:40px;flex:1;\">\n    <div style=\"flex:1;background:#150E26;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:36px 40px;display:flex;flex-direction:column;\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:22px;letter-spacing:3px;color:#4FD6FF;margin-bottom:8px;\">THE MICROCONTROLLER<\u002Fdiv>\n      <div style=\"font-family:'Chakra Petch',sans-serif;font-size:44px;color:#ECE6F4;margin-bottom:22px;\">MCU options<\u002Fdiv>\n      <ul style=\"list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:20px;\">\n        <li style=\"font-size:30px;line-height:1.4;color:#C9BEDA;\"><span style=\"color:#4FD6FF;\">ESP32<\u002Fspan> — <span style=\"color:#ECE6F4;\">Heltec V3, T-Beam<\u002Fspan>. The default.<\u002Fli>\n        <li style=\"font-size:30px;line-height:1.4;color:#C9BEDA;\"><span style=\"color:#4FD6FF;\">nRF52<\u002Fspan> — <span style=\"color:#ECE6F4;\">RAK4631, T114<\u002Fspan>. Weeks of battery.<\u002Fli>\n        <li style=\"font-size:30px;line-height:1.4;color:#C9BEDA;\"><span style=\"color:#4FD6FF;\">Ready-made<\u002Fspan> — <span style=\"color:#ECE6F4;\">Seeed T1000-E, Card Tracker<\u002Fspan>. No fuss.<\u002Fli>\n      <\u002Ful>\n      <div style=\"margin-top:auto;padding-top:24px;font-size:26px;color:#9DE84B;\">→ <span style=\"color:#ECE6F4;\">ESP32<\u002Fspan> — what most boards ship with.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;background:#150E26;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:36px 40px;display:flex;flex-direction:column;\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:22px;letter-spacing:3px;color:#9DE84B;margin-bottom:8px;\">THE RADIO<\u002Fdiv>\n      <div style=\"font-family:'Chakra Petch',sans-serif;font-size:44px;color:#ECE6F4;margin-bottom:22px;\">LoRa modules<\u002Fdiv>\n      <ul style=\"list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:20px;\">\n        <li style=\"font-size:30px;line-height:1.4;color:#C9BEDA;\"><span style=\"color:#9DE84B;\">SX1262<\u002Fspan> — current gen. <span style=\"color:#ECE6F4;\">Buy this.<\u002Fspan><\u002Fli>\n        <li style=\"font-size:30px;line-height:1.4;color:#C9BEDA;\"><span style=\"color:#9DE84B;\">SX1276/78<\u002Fspan> — older, still fine.<\u002Fli>\n      <\u002Ful>\n      <div style=\"margin-top:auto;padding-top:24px;font-size:26px;color:#9DE84B;\">→ <span style=\"color:#ECE6F4;\">SX1262<\u002Fspan> — better range per milliwatt.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"From My Workbench\" data-screen-label=\"17 Gallery\" data-speaker-notes=\"Breather slide, human and casual — just talk over the photos. Show the reality behind the clean diagrams: the actual boards, the tangle of antennas, the half-finished builds and the mess on my desk. Point out one or two things you genuinely remember — the first build that worked, the antenna experiment, the solar setup in the garden. The goal is permission: it looks approachable and a bit scrappy, not like lab equipment, so anyone in the room could picture themselves doing it. Low energy, warm, no new facts.\" style=\"box-sizing:border-box;padding:80px 110px 70px;background:#0E0A18;color:#ECE6F4;font-family:'Space Grotesk',sans-serif;display:flex;flex-direction:column;overflow:hidden;\">\n  <div style=\"font-family:'Space Mono',monospace;font-size:24px;letter-spacing:4px;color:#9DE84B;margin-bottom:20px;\">// 17 · FROM MY WORKBENCH<\u002Fdiv>\n  <h2 style=\"font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:72px;line-height:1.0;margin:0;\">What the tinkering looks like<\u002Fh2>\n  <div style=\"display:flex;gap:28px;margin-top:44px;flex:1;\">\n    <div style=\"flex:1.4;position:relative;border:1px solid rgba(255,255,255,.12);border-radius:16px;overflow:hidden;\">\n      <x-import component-from-global-scope=\"image-slot\" from=\"4f15e0b1-38a5-4457-bd20-0e21235dbb58#/image-slot.js\" id=\"workbench-1\" shape=\"rect\" src=\"uploads/workbench-1.webp\" placeholder=\"Drop a photo\" hint-size=\"100%,100%\" style=\"position:absolute;inset:0;\"><\u002Fx-import>\n    <\u002Fdiv>\n    <div style=\"flex:1;display:flex;flex-direction:column;gap:28px;\">\n      <div style=\"flex:1;position:relative;border:1px solid rgba(255,255,255,.12);border-radius:16px;overflow:hidden;\">\n        <x-import component-from-global-scope=\"image-slot\" from=\"4f15e0b1-38a5-4457-bd20-0e21235dbb58#/image-slot.js\" id=\"workbench-2\" shape=\"rect\" src=\"uploads/workbench-2.webp\" placeholder=\"Drop a photo\" hint-size=\"100%,100%\" style=\"position:absolute;inset:0;\"><\u002Fx-import>\n      <\u002Fdiv>\n      <div style=\"flex:1;position:relative;border:1px solid rgba(255,255,255,.12);border-radius:16px;overflow:hidden;\">\n        <x-import component-from-global-scope=\"image-slot\" from=\"4f15e0b1-38a5-4457-bd20-0e21235dbb58#/image-slot.js\" id=\"workbench-3\" shape=\"rect\" src=\"uploads/workbench-3.webp\" placeholder=\"Drop a photo\" hint-size=\"100%,100%\" style=\"position:absolute;inset:0;\"><\u002Fx-import>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Meet Meshtastic\" data-screen-label=\"18 Meshtastic\" data-speaker-notes=\"Now name the software that ties it all together: Meshtastic — free, open-source, community-built, runs on all the boards we just discussed. Clarify the roles so it clicks: the little radio does the networking; your phone is just the screen and keyboard, talking to it over Bluetooth — meaning your phone needs zero signal of its own. Hit the freedoms: no towers, no SIM, no monthly fee, nothing to sign up for. Then the reassurance people always ask about: channels are encrypted (AES), so only people with your channel key can read the messages — your tribe's chat stays private even though the radio waves are public. This slide sets up the live demo next — say 'let me show you'.\" style=\"box-sizing:border-box;padding:80px 110px 70px;background:#0E0A18;color:#ECE6F4;font-family:'Space Grotesk',sans-serif;display:flex;flex-direction:row;gap:70px;align-items:center;overflow:hidden;\">\n  <div style=\"flex:1;\">\n    <div style=\"font-family:'Space Mono',monospace;font-size:24px;letter-spacing:4px;color:#9DE84B;margin-bottom:20px;\">// 18 · THE SOFTWARE<\u002Fdiv>\n    <h2 style=\"font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:80px;line-height:0.98;margin:0;\">Meet <span style=\"color:#9DE84B;text-shadow:0 0 36px rgba(157,232,75,.4);\">Meshtastic<\u002Fspan><\u002Fh2>\n    <p style=\"font-size:34px;line-height:1.4;color:#C9BEDA;margin:32px 0 0;max-width:760px;\">Free, open-source software that turns cheap <span style=\"color:#9DE84B;\">LoRa<\u002Fspan> radios into your own private mesh. LoRa is the voice — <span style=\"color:#ECE6F4;\">Meshtastic is the language<\u002Fspan>. And your phone? Just the keyboard.<\u002Fp>\n    <ul style=\"list-style:none;padding:0;margin:40px 0 0;display:flex;flex-direction:column;gap:22px;\">\n      <li style=\"display:flex;align-items:center;gap:18px;font-size:31px;color:#ECE6F4;\"><span style=\"width:11px;height:11px;border-radius:50%;background:#9DE84B;box-shadow:0 0 12px rgba(157,232,75,.7);\"><\u002Fspan>No towers, no SIM card, no monthly plan<\u002Fli>\n      <li style=\"display:flex;align-items:center;gap:18px;font-size:31px;color:#ECE6F4;\"><span style=\"width:11px;height:11px;border-radius:50%;background:#FF8A3D;box-shadow:0 0 12px rgba(255,138,61,.7);\"><\u002Fspan>Connects to your phone over Bluetooth<\u002Fli>\n      <li style=\"display:flex;align-items:center;gap:18px;font-size:31px;color:#ECE6F4;\"><span style=\"width:11px;height:11px;border-radius:50%;background:#4FD6FF;box-shadow:0 0 12px rgba(79,214,255,.7);\"><\u002Fspan>Messages are encrypted — only your tribe can read them<\u002Fli>\n      <li style=\"display:flex;align-items:center;gap:18px;font-size:31px;color:#ECE6F4;\"><span style=\"width:11px;height:11px;border-radius:50%;background:#C96BFF;box-shadow:0 0 12px rgba(201,107,255,.7);\"><\u002Fspan>Open source — it belongs to everyone<\u002Fli>\n    <\u002Ful>\n    <div style=\"font-family:'Space Mono',monospace;font-size:26px;color:#9DE84B;margin-top:40px;\">meshtastic.org<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"flex:0 0 600px;display:flex;gap:24px;\">\n    <div style=\"flex:1;height:640px;position:relative;border:1px solid rgba(255,255,255,.1);border-radius:32px;overflow:hidden;\">\n      <x-import component-from-global-scope=\"image-slot\" from=\"4f15e0b1-38a5-4457-bd20-0e21235dbb58#/image-slot.js\" id=\"meshtastic-chat-shot\" shape=\"rect\" placeholder=\"Drop a screenshot: app chat view\" hint-size=\"280px,640px\" style=\"position:absolute;inset:0;\" src=\"uploads/meshtastic-chat-shot.webp\"><\u002Fx-import>\n    <\u002Fdiv>\n    <div style=\"flex:1;height:640px;position:relative;border:1px solid rgba(255,255,255,.1);border-radius:32px;overflow:hidden;margin-top:40px;\">\n      <x-import component-from-global-scope=\"image-slot\" from=\"4f15e0b1-38a5-4457-bd20-0e21235dbb58#/image-slot.js\" id=\"meshtastic-map-shot\" shape=\"rect\" placeholder=\"Drop a screenshot: node map\" hint-size=\"280px,640px\" style=\"position:absolute;inset:0;\" src=\"uploads/meshtastic-map-shot.webp\"><\u002Fx-import>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Live Demo\" data-screen-label=\"19 Demo\" data-speaker-notes=\"Live demo — highest-risk, highest-reward moment, so narrate every step out loud for the people who can't see the screen. Plan: send a message from my phone, let it hop across the room, and show it arrive on the second device; then open the node list (who's online) and the map (where they are and how far). Talk while it connects so silence doesn't kill the energy. Pre-empt failure with humour — 'if the radio gods are unkind…' — and have the screenshots ready as the backup so a flaky Bluetooth pairing never stalls the talk. Keep it to a couple of minutes; the goal is a visceral 'oh, it actually works', not a feature tour.\" style=\"box-sizing:border-box;padding:80px 110px 70px;background:radial-gradient(120% 120% at 50% 25%, #1B1430 0%, #0E0A18 60%);color:#ECE6F4;font-family:'Space Grotesk',sans-serif;display:flex;flex-direction:column;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:20px;margin-bottom:18px;\">\n    <span style=\"width:16px;height:16px;border-radius:50%;background:#FF5A4A;box-shadow:0 0 16px rgba(255,90,74,.9);animation:blink 1.4s ease-in-out infinite;\"><\u002Fspan>\n    <span style=\"font-family:'Space Mono',monospace;font-size:26px;letter-spacing:5px;color:#FF8A3D;\">// 19 · LIVE<\u002Fspan>\n  <\u002Fdiv>\n  <h2 style=\"font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:84px;line-height:1.0;margin:0;\">No bars. Watch.<\u002Fh2>\n  <p style=\"font-size:34px;line-height:1.4;color:#C9BEDA;margin:24px 0 0;max-width:1200px;\">Let's send a real message across this room — and watch the map light up.<\u002Fp>\n  <div style=\"display:flex;gap:28px;margin-top:36px;flex:1;\">\n    <div style=\"flex:1.4;background:repeating-linear-gradient(45deg,#1A1230,#1A1230 14px,#170F29 14px,#170F29 28px);border:1px solid rgba(255,255,255,.1);border-radius:16px;display:flex;align-items:center;justify-content:center;text-align:center;color:#9A8BB2;font-family:'Space Mono',monospace;font-size:26px;\">[ live node map / range — screenshot backup ]<\u002Fdiv>\n    <div style=\"flex:1;display:flex;flex-direction:column;gap:28px;\">\n      <div style=\"flex:1;background:repeating-linear-gradient(45deg,#1A1230,#1A1230 14px,#170F29 14px,#170F29 28px);border:1px solid rgba(255,255,255,.1);border-radius:16px;display:flex;align-items:center;justify-content:center;text-align:center;color:#9A8BB2;font-family:'Space Mono',monospace;font-size:24px;padding:20px;\">[ chat thread ]<\u002Fdiv>\n      <div style=\"flex:1;background:repeating-linear-gradient(45deg,#1A1230,#1A1230 14px,#170F29 14px,#170F29 28px);border:1px solid rgba(255,255,255,.1);border-radius:16px;display:flex;align-items:center;justify-content:center;text-align:center;color:#9A8BB2;font-family:'Space Mono',monospace;font-size:24px;padding:20px;\">[ node list · signal ]<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"When They Switch It Off\" data-screen-label=\"20 Freedom\" data-speaker-notes=\"Lift the stakes — this is the slide that makes the talk matter beyond a festival toy, so let it land seriously. The principle: any network with an owner has an off switch, and whoever owns the switch controls whether you can speak. Concrete example: during the 2022 protests in Iran, authorities throttled and shut down the internet specifically to stop people coordinating — a tactic used in many countries during unrest. Contrast: a mesh you and your friends own has no centre to seize and no plug for anyone to pull — resilience isn't a bonus feature, it's a consequence of the shape we drew back on slide 7. Frame it plainly: this is freedom of communication engineered into the architecture. Same tech that finds your friend at a party keeps people connected when someone tries to cut the cord. Don't preach — state it and pause.\" style=\"box-sizing:border-box;padding:80px 110px 70px;background:radial-gradient(130% 130% at 18% 30%, #2A1530 0%, #0E0A18 60%);color:#ECE6F4;font-family:'Space Grotesk',sans-serif;display:flex;flex-direction:row;gap:70px;align-items:center;overflow:hidden;\">\n  <div style=\"flex:1;\">\n    <div style=\"font-family:'Space Mono',monospace;font-size:24px;letter-spacing:4px;color:#FF8A3D;margin-bottom:20px;\">// 20 · WHY IT REALLY MATTERS<\u002Fdiv>\n    <h2 style=\"font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:76px;line-height:1.0;margin:0;\">When they switch it off<\u002Fh2>\n    <p style=\"font-size:36px;line-height:1.42;color:#C9BEDA;margin:34px 0 0;max-width:880px;\">A network with an owner has an <span style=\"color:#FF8A3D;\">off switch<\u002Fspan>. Governments slow down or shut off the internet to silence people.<\u002Fp>\n    <div style=\"margin-top:34px;border-left:3px solid #FF8A3D;padding:6px 0 6px 28px;max-width:880px;\">\n      <div style=\"font-size:32px;line-height:1.4;color:#ECE6F4;\">Iran, 2022 — the internet was shut down and throttled across the country during the protests, so people could not organise or be heard.<\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size:34px;line-height:1.42;color:#ECE6F4;margin:34px 0 0;max-width:880px;\">A mesh you own has <span style=\"color:#9DE84B;\">no centre to take<\u002Fspan> and no plug to pull. The network is the people.<\u002Fp>\n  <\u002Fdiv>\n  <div style=\"flex:0 0 640px;display:flex;flex-direction:column;gap:18px;\">\n    <div style=\"position:relative;height:640px;border:1px solid rgba(255,255,255,.12);border-radius:18px;overflow:hidden;\">\n      <x-import component-from-global-scope=\"image-slot\" from=\"4f15e0b1-38a5-4457-bd20-0e21235dbb58#/image-slot.js\" id=\"blackout-photo\" shape=\"rect\" placeholder=\"Drop a photo: 2022 Iran protests / internet blackout\" hint-size=\"640px,640px\" style=\"position:absolute;inset:0;\" src=\"uploads/blackout-photo.webp\"><\u002Fx-import>\n    <\u002Fdiv>\n    <div style=\"font-family:'Space Mono',monospace;font-size:24px;color:#9A8BB2;line-height:1.4;\">Iran, 2022 — the network goes dark, the streets stay full.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n\n<section data-label=\"Which One Are You?\" data-screen-label=\"21\" data-speaker-notes=\"Call back to the three audiences from slide 4 and let people place themselves — point to each card. The tribe: find each other across forest and crowd. The parents (me included): always reachable by camp without any mobile signal. The preppers: a network that keeps working in a blackout, a disaster, or off-grid when everything centralized is down. The unifying line: it doesn't matter which one you are, the path to building it is the same three steps — which is exactly the next slide. Light, inclusive, momentum-building; this is the turn from 'why' to 'how you start'.\" style=\"box-sizing:border-box;padding:90px 110px 80px;background:#9DE84B;color:#0E0A18;font-family:'Space Grotesk',sans-serif;display:flex;flex-direction:column;justify-content:center;overflow:hidden;\">\n  <div style=\"font-family:'Space Mono',monospace;font-size:24px;letter-spacing:4px;color:#0E0A18;opacity:0.6;margin-bottom:24px;\">// 21 · WHICH ONE ARE YOU?<\u002Fdiv>\n  <h2 style=\"font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:96px;line-height:1.0;margin:0;max-width:1500px;\">Which one are you?<\u002Fh2>\n  <p style=\"font-size:38px;line-height:1.4;margin:36px 0 0;max-width:1300px;font-weight:500;\">Whoever you are, the same three steps get you there.<\u002Fp>\n  <div style=\"display:flex;gap:28px;margin-top:60px;\">\n    <div style=\"flex:1;background:#0E0A18;border-radius:16px;padding:40px;\">\n      <div style=\"font-family:'Chakra Petch',sans-serif;font-size:40px;color:#9DE84B;margin-bottom:18px;\">The Tribe<\u002Fdiv>\n      <div style=\"font-size:30px;line-height:1.4;color:#C9BEDA;\">Find your people across kilometres of forest and crowded dancefloors.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;background:#0E0A18;border-radius:16px;padding:40px;\">\n      <div style=\"font-family:'Chakra Petch',sans-serif;font-size:40px;color:#FF8A3D;margin-bottom:18px;\">The Parents<\u002Fdiv>\n      <div style=\"font-size:30px;line-height:1.4;color:#C9BEDA;\">Your camp can always reach you — no mobile signal needed.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;background:#0E0A18;border-radius:16px;padding:40px;\">\n      <div style=\"font-family:'Chakra Petch',sans-serif;font-size:40px;color:#4FD6FF;margin-bottom:18px;\">The Preppers<\u002Fdiv>\n      <div style=\"font-size:30px;line-height:1.4;color:#C9BEDA;\">A network that still works when everything else goes down.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Build Your Own\" data-screen-label=\"22 Build\" data-speaker-notes=\"Demolish the intimidation barrier — say 'genuinely three steps' and mean it. One: buy a board (€25–40, links coming). Two: flash Meshtastic — you literally plug it into a USB port and click install on the official web flasher in your browser, no coding, no command line, a couple of minutes. Three: join a channel — scan a QR code or share a key and your group chat exists. Then widen the horizon so it doesn't feel festival-only: hikers use it where there's no coverage, communities keep it for blackouts and emergencies, off-grid and rural setups run on it year-round. The message: this is a real, general-purpose tool you can start tonight, not a one-weekend gimmick.\" style=\"box-sizing:border-box;padding:80px 110px 70px;background:#0E0A18;color:#ECE6F4;font-family:'Space Grotesk',sans-serif;display:flex;flex-direction:column;overflow:hidden;\">\n  <div style=\"font-family:'Space Mono',monospace;font-size:24px;letter-spacing:4px;color:#9DE84B;margin-bottom:20px;\">// 22 · GET STARTED<\u002Fdiv>\n  <h2 style=\"font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:72px;line-height:1.0;margin:0;\">Build your own — three steps<\u002Fh2>\n  <div style=\"display:flex;gap:28px;margin-top:48px;\">\n    <div style=\"flex:1;background:#1A1230;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:38px;\">\n      <div style=\"font-family:'Chakra Petch',sans-serif;font-size:80px;color:#9DE84B;line-height:1;\">1<\u002Fdiv>\n      <div style=\"font-family:'Chakra Petch',sans-serif;font-size:36px;color:#ECE6F4;margin-top:16px;\">Buy a board<\u002Fdiv>\n      <div style=\"font-size:29px;line-height:1.4;color:#C9BEDA;margin-top:12px;\">A T-Beam or Heltec V3, about €30. Add an antenna and a power bank.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;background:#1A1230;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:38px;\">\n      <div style=\"font-family:'Chakra Petch',sans-serif;font-size:80px;color:#FF8A3D;line-height:1;\">2<\u002Fdiv>\n      <div style=\"font-family:'Chakra Petch',sans-serif;font-size:36px;color:#ECE6F4;margin-top:16px;\">Install Meshtastic<\u002Fdiv>\n      <div style=\"font-size:29px;line-height:1.4;color:#C9BEDA;margin-top:12px;\">Plug it into USB, click \"install\" on the Meshtastic web page. No coding.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;background:#1A1230;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:38px;\">\n      <div style=\"font-family:'Chakra Petch',sans-serif;font-size:80px;color:#4FD6FF;line-height:1;\">3<\u002Fdiv>\n      <div style=\"font-family:'Chakra Petch',sans-serif;font-size:36px;color:#ECE6F4;margin-top:16px;\">Join a channel<\u002Fdiv>\n      <div style=\"font-size:29px;line-height:1.4;color:#C9BEDA;margin-top:12px;\">Connect your phone, share a QR code with friends, start texting.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin-top:40px;background:#150E26;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:28px 40px;display:flex;align-items:center;gap:40px;flex-wrap:wrap;\">\n    <div style=\"font-family:'Space Mono',monospace;font-size:26px;color:#9A8BB2;\">BEYOND THE FESTIVAL →<\u002Fdiv>\n    <div style=\"font-size:30px;color:#ECE6F4;\">Hiking &amp; sailing<\u002Fdiv>\n    <div style=\"font-size:30px;color:#9A8BB2;\">·<\u002Fdiv>\n    <div style=\"font-size:30px;color:#ECE6F4;\">Power cuts &amp; emergencies<\u002Fdiv>\n    <div style=\"font-size:30px;color:#9A8BB2;\">·<\u002Fdiv>\n    <div style=\"font-size:30px;color:#ECE6F4;\">Off-grid communities<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Here and Now\" data-screen-label=\"23 Close\" data-speaker-notes=\"The close — slow down, drop the slides, look up, speak from conviction. Tie the bow back to the opening thesis: technology at its best is simple, hidden, and serves people instead of farming their attention. What we built tonight is a network that belongs to you and your friends rather than a corporation — no owner, no off switch, no bill. The call to action, concrete and doable this week: grab a board, flash it, start a channel, find your tribe. End on the festival ethos and the real point of putting the phone down — be here and now. Let that last line hang before you say thank you.\" style=\"box-sizing:border-box;padding:0;background:radial-gradient(120% 120% at 50% 40%, #2A1B40 0%, #150E26 45%, #0E0A18 100%);color:#ECE6F4;font-family:'Space Grotesk',sans-serif;display:flex;align-items:center;justify-content:center;overflow:hidden;\">\n  <div style=\"position:absolute;left:50%;top:50%;width:520px;height:520px;margin:-260px 0 0 -260px;border-radius:50%;border:2px solid rgba(157,232,75,.3);animation:ringPulse 5s ease-out infinite;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:50%;top:50%;width:520px;height:520px;margin:-260px 0 0 -260px;border-radius:50%;border:2px solid rgba(79,214,255,.25);animation:ringPulse 5s ease-out infinite;animation-delay:2.5s;\"><\u002Fdiv>\n  <div style=\"position:relative;z-index:2;text-align:center;padding:0 120px;\">\n    <div style=\"font-family:'Space Mono',monospace;font-size:26px;letter-spacing:7px;color:#9DE84B;margin-bottom:30px;\">SIMPLE · HIDDEN · SERVES PEOPLE<\u002Fdiv>\n    <h2 style=\"font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:112px;line-height:0.98;margin:0;\">Here and now<\u002Fh2>\n    <p style=\"font-size:38px;line-height:1.4;color:#C9BEDA;margin:38px auto 0;max-width:1080px;\">A network that belongs to you and your friends — not to a big company. Go and play with it.<\u002Fp>\n    <div style=\"margin-top:52px;display:inline-flex;align-items:center;gap:18px;background:#150E26;border:1px solid rgba(157,232,75,.3);border-radius:999px;padding:22px 40px;font-family:'Space Mono',monospace;font-size:30px;color:#9DE84B;\">→ start experimenting · meshtastic.org<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Questions\" data-screen-label=\"24 Q&amp;A\" data-speaker-notes=\"Open the floor and pull people to the table — hands-on beats Q&amp;A for this crowd, so invite them up to hold a board, send a message, and watch it hop across the room. Keep the two references handy for anyone who asks where to start: meshtastic.org for the software and web flasher; search LilyGo T-Beam or Heltec V3 to buy a board. Likely questions to be ready for: range in a real crowd (less than the record, but a mesh compensates), battery life (days, weeks with solar), is it legal (yes on the license-free band, respect local power limits), is it private (yes, encrypted channels), does it need a phone (only as a keyboard, no signal). Relaxed and generous — this is the part where the tinkerers find each other.\" style=\"box-sizing:border-box;padding:0;background:radial-gradient(125% 120% at 50% 32%, #2A1B40 0%, #150E26 45%, #0E0A18 100%);color:#ECE6F4;font-family:'Space Grotesk',sans-serif;display:flex;align-items:center;justify-content:center;overflow:hidden;\">\n  <div style=\"position:absolute;left:50%;top:46%;width:560px;height:560px;margin:-280px 0 0 -280px;border-radius:50%;border:2px solid rgba(157,232,75,.4);animation:ringPulse 4.5s ease-out infinite;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:50%;top:46%;width:560px;height:560px;margin:-280px 0 0 -280px;border-radius:50%;border:2px solid rgba(79,214,255,.35);animation:ringPulse 4.5s ease-out infinite;animation-delay:1.5s;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:50%;top:46%;width:560px;height:560px;margin:-280px 0 0 -280px;border-radius:50%;border:2px solid rgba(201,107,255,.3);animation:ringPulse 4.5s ease-out infinite;animation-delay:3s;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:50%;top:46%;width:18px;height:18px;margin:-9px 0 0 -9px;border-radius:50%;background:#9DE84B;box-shadow:0 0 24px 4px rgba(157,232,75,.9);\"><\u002Fdiv>\n  <div style=\"position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;text-align:center;padding:0 110px;\">\n    <div style=\"font-family:'Space Mono',monospace;font-size:24px;letter-spacing:4px;color:#9DE84B;margin-bottom:28px;\">// 24 · OVER TO YOU<\u002Fdiv>\n    <h2 style=\"font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:128px;line-height:0.98;margin:0;\">Questions?<\u002Fh2>\n    <p style=\"font-size:40px;line-height:1.4;color:#C9BEDA;margin:36px 0 0;max-width:1200px;\">Come to the table — hold the devices, send a message, watch it hop across the room.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fx-import>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\n\nclass Component extends DCLogic {\n  componentDidMount() {\n    this._railOn = true;\n    try { if (localStorage.getItem('deck-stage.railVisible') === '0') this._railOn = false; } catch (e) {}\n    this._onKey = (e) => {\n      if (e.key !== 't' && e.key !== 'T') return;\n      const el = e.target;\n      if (el && (el.isContentEditable || /^(input|textarea|select)$/i.test(el.tagName))) return;\n      this._railOn = !this._railOn;\n      window.postMessage({ type: '__deck_rail_visible', on: this._railOn }, '*');\n    };\n    window.addEventListener('keydown', this._onKey);\n  }\n  componentWillUnmount() {\n    if (this._onKey) window.removeEventListener('keydown', this._onKey);\n  }\n  renderVals() { return {}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
