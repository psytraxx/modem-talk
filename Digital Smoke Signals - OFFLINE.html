  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ale(1.75);opacity:0} }\n  @keyframes floaty { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }\n  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }\n  @keyframes dashmove { to { stroke-dashoffset:-240; } }\n  @keyframes bandShiftLeft { from { transform:translate(0,0); } to { transform:translate(-20px,0); } }\n  @keyframes bandShiftRight { from { transform:translate(0,0); } to { transform:translate(20px,0); } }\n  @keyframes loraGrow { from { x:540px; y:120px; width:200px; height:240px; } to { x:520px; y:86px; width:240px; height:308px; } }\n  @keyframes loraLabelIn { from { opacity:0; } to { opacity:1; } }\n  @keyframes tuneStatic { 0% { opacity:1; transform:translateY(0); } 8% { opacity:.95; transform:translateY(-10px); } 18% { opacity:.85; transform:translateY(8px); } 30% { opacity:.7; transform:translateY(-5px); } 46% { opacity:.55; transform:translateY(4px); } 65% { opacity:.32; transform:translateY(0); } 100% { opacity:0; } }\n  @keyframes tuneLabelFlicker { 0%,100% { opacity:0; } 10%,14% { opacity:1; } 22%,26% { opacity:.2; } 34%,38% { opacity:1; } 55% { opacity:.5; } 75% { opacity:0; } }\n  @keyframes tuneContentIn { from { opacity:0; } to { opacity:1; } }\n  @media (prefers-reduced-motion:reduce) {\n    section[data-label=\"How I Found LoRa\"] .tune-content { opacity:1; }\n  }\n  @media (prefers-reduced-motion:no-preference) {\n    section[data-label=\"How I Found LoRa\"][data-deck-active] .tune-static { animation: tuneStatic .9s steps(9) both; }\n    section[data-label=\"How I Found LoRa\"][data-deck-active] .tune-label { animation: tuneLabelFlicker .9s steps(2) both; }\n    section[data-label=\"How I Found LoRa\"][data-deck-active] .tune-content { animation: tuneContentIn .4s ease .9s both; }\n  }\n  @media (prefers-reduced-motion:no-preference) {\n    section[data-label=\"A Map of the Airwaves\"][data-deck-active] .band-am,\n    section[data-label=\"A Map of the Airwaves\"][data-deck-active] .band-fm { animation: bandShiftLeft .7s cubic-bezier(.2,.8,.2,1) .4s both; }\n    section[data-label=\"A Map of the Airwaves\"][data-deck-active] .band-mobile,\n    section[data-label=\"A Map of the Airwaves\"][data-deck-active] .band-wifi,\n    section[data-label=\"A Map of the Airwaves\"][data-deck-active] .band-light { animation: bandShiftRight .7s cubic-bezier(.2,.8,.2,1) .4s both; }\n    section[data-label=\"A Map of the Airwaves\"][data-deck-active] .lora-rect { animation: loraGrow .7s cubic-bezier(.2,.8,.2,1) .4s both; }\n    section[data-label=\"A Map of the Airwaves\"][data-deck-active] .lora-label { animation: loraLabelIn .3s ease 1.0s both; }\n  }\n  @keyframes deckReveal { from { opacity:0; transform:translateY(26px); } to { opacity:1; transform:translateY(0); } }\n  @media (prefers-reduced-motion:no-preference) {\n    section[data-deck-active] > * { animation: deckReveal .65s cubic-bezier(.2,.8,.2,1) both; }\n    section[data-deck-active] > *:nth-child(2) { animation-delay:.1s; }\n    section[data-deck-active] > *:nth-child(3) { animation-delay:.2s; }\n    section[data-deck-active] > *:nth-child(4) { animation-delay:.3s; }\n    section[data-deck-active] > *:nth-child(5) { animation-delay:.4s; }\n    section[data-deck-active] > *:nth-child(6) { animation-delay:.5s; }\n    section[data-deck-active] > *:nth-child(7) { animation-delay:.6s; }\n  }\n  /* empty bio slots rise above filled ones so drag-and-drop reaches them */\n  .bio-fader:has(image-slot:not([data-filled])) { z-index:20 !important; animation-play-state:paused !important; opacity:1; }\n  @keyframes slideshowFade { 0%{opacity:1} 27%{opacity:1} 33%{opacity:0} 94%{opacity:0} 100%{opacity:1} }\n  * { text-wrap: pretty; }\n<\u002Fstyle>\n<\u002Fhelmet>\n<x-import component-from-global-scope=\"deck-stage\" from=\"bc180f35-e249-4576-abe6-1298f0496441#/deck-stage.js\" width=\"1920\" height=\"1080\" hint-size=\"100%,100%\" data-uneditable=\"\">\n\n<!-- ===================== 01 — TITLE ===================== -->\n<section data-label=\"Title\" data-screen-label=\"01 Title\" data-speaker-notes=\"Open warm, low-key. Set the frame: by the end of the talk you'll know how to build a pocket radio network that finds your friends here without any phone signal — and you can start one before you leave. The title is literal: smoke signals were the original off-grid, no-infrastructure mesh — line of sight, everyone can see them, no one owns them. We're just doing the digital version. Keep it playful, no jargon yet.\" style=\"box-sizing:border-box;padding:0;background:radial-gradient(125% 120% at 50% 32%, #2A1B40 0%, #150E26 45%, #0E0A18 100%);color:#ECE6F4;font-family:'Space Grotesk',sans-serif;display:flex;align-items:center;justify-content:center;overflow:hidden;\">\n  <div style=\"position:absolute;left:50%;top:46%;width:560px;height:560px;margin:-280px 0 0 -280px;border-radius:50%;border:2px solid rgba(157,232,75,.4);animation:ringPulse 4.5s ease-out infinite;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:50%;top:46%;width:560px;height:560px;margin:-280px 0 0 -280px;border-radius:50%;border:2px solid rgba(79,214,255,.35);animation:ringPulse 4.5s ease-out infinite;animation-delay:1.5s;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:50%;top:46%;width:560px;height:560px;margin:-280px 0 0 -280px;border-radius:50%;border:2px solid rgba(201,107,255,.3);animation:ringPulse 4.5s ease-out infinite;animation-delay:3s;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:50%;top:46%;width:18px;height:18px;margin:-9px 0 0 -9px;border-radius:50%;background:#9DE84B;box-shadow:0 0 24px 4px rgba(157,232,75,.9);\"><\u002Fdiv>\n  <div style=\"position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;text-align:center;padding:0 120px;\">\n    <div style=\"font-family:'Space Mono',monospace;font-size:26px;letter-spacing:8px;color:#9A8BB2;text-transform:uppercase;margin-bottom:34px;\">MO:DEM · Off-Grid Session<\u002Fdiv>\n    <h1 style=\"font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:128px;line-height:0.96;letter-spacing:-1px;margin:0;max-width:1500px;\">Digital <span style=\"color:#9DE84B;text-shadow:0 0 40px rgba(157,232,75,.5);\">Smoke<\u002Fspan> Signals<\u002Fh1>\n    <p style=\"font-size:40px;color:#C9BEDA;font-weight:400;margin:40px 0 0;max-width:1100px;line-height:1.35;\">The art of off-grid communication with Meshtastic<\u002Fp>\n    <div style=\"margin-top:64px;display:flex;align-items:center;gap:18px;font-family:'Space Mono',monospace;font-size:24px;color:#7E7090;\">\n      <span style=\"width:9px;height:9px;border-radius:50%;background:#FF8A3D;box-shadow:0 0 12px rgba(255,138,61,.8);\"><\u002Fspan>\n      <span>A talk &amp; live demo by Eric<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"The Paradox\" data-screen-label=\"02 Paradox\" data-speaker-notes=\"The hook. Everyone in the room has lived this: you're at the festival to unplug, and yet you're holding your phone over your head trying to get one bar to text 'where are you?'. Name the two failures separately — (1) coverage: thousands of people on one rural tower means no signal exactly when you need it; (2) attention: even when it works, opening the phone pulls you into notifications, and twenty minutes later you're scrolling instead of dancing. Tonight solves both. Pause here, let people nod.\" style=\"box-sizing:border-box;padding:90px 110px 80px;background:radial-gradient(130% 120% at 80% 20%, #241836 0%, #0E0A18 60%);color:#ECE6F4;font-family:'Space Grotesk',sans-serif;display:flex;flex-direction:column;justify-content:center;overflow:hidden;\">\n  <div style=\"font-family:'Space Mono',monospace;font-size:24px;letter-spacing:4px;color:#9DE84B;margin-bottom:28px;\">// 02 · THE PARADOX<\u002Fdiv>\n  <h2 style=\"font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:96px;line-height:1.02;margin:0;max-width:1500px;\">Lost in the crowd<\u002Fh2>\n  <p style=\"font-size:42px;line-height:1.4;color:#C9BEDA;margin:44px 0 0;max-width:1280px;\">We travel here to escape the <span style=\"color: rgb(236, 230, 244);\">\"default world\"<\u002Fspan> — then spend the time staring at a screen just to find our friends at the dancefloor.<\u002Fp>\n  <div style=\"display:flex;gap:28px;margin-top:64px;max-width:1400px;\">\n    <div style=\"flex:1;background:#1A1230;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:38px;\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:24px;color:#FF8A3D;margin-bottom:16px;\">TOO FAR<\u002Fdiv>\n      <div style=\"font-size:30px;line-height:1.4;color:#C9BEDA;\">At Mo:Dem there's <span style=\"color: rgb(236, 230, 244);\">no mobile network at all<\u002Fspan> — too far from any tower.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;background:#1A1230;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:38px;\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:24px;color:#4FD6FF;margin-bottom:16px;\">TOO CROWDED<\u002Fdiv>\n      <div style=\"font-size:30px;line-height:1.4;color:#C9BEDA;\">And where there is a signal, too many phones in one field break it fast.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Hi, I'm Eric\" data-screen-label=\"03 Bio\" data-speaker-notes=\"Keep it short — credibility, not CV. Points to land: software engineer by trade, so I care how things actually work under the hood; built the backstage and ticketing systems for Mo:Dem with Chris, so I know this world from both sides. Been coming to psy and goa gatherings since around 2000 — the reference to 'my people' is real. Now I come as a dad who camps with kids, which is where the 'need to stay reachable' angle comes from personally. Recently AI tooling lowered the barrier and pulled me back into hardware tinkering. Thesis I'll return to at the end: the best tech is simple, hidden, and serves people rather than harvesting them.\" style=\"box-sizing:border-box;padding:90px 110px 80px;background:#0E0A18;color:#ECE6F4;font-family:'Space Grotesk',sans-serif;display:flex;flex-direction:row;align-items:center;gap:80px;overflow:hidden;\">\n  <div style=\"flex:0 0 520px;height:680px;border:1px solid rgba(255,255,255,.1);border-radius:18px;overflow:hidden;position:relative;background:#150E26;\">\n    <div class=\"bio-fader\" style=\"position:absolute;inset:0;animation:slideshowFade 15s linear infinite;animation-delay:-5s;z-index:1;\">\n      <x-import component-from-global-scope=\"image-slot\" from=\"4f15e0b1-38a5-4457-bd20-0e21235dbb58#/image-slot.js\" id=\"bio-slide-2\" shape=\"rect\" src=\"uploads/bio-slide-2.webp\" placeholder=\"Drop photo 2\" hint-size=\"520px,680px\" style=\"position:absolute;inset:0;\"><\u002Fx-import>\n    <\u002Fdiv>\n    <div class=\"bio-fader\" style=\"position:absolute;inset:0;animation:slideshowFade 15s linear infinite;animation-delay:-10s;z-index:2;\">\n      <x-import component-from-global-scope=\"image-slot\" from=\"4f15e0b1-38a5-4457-bd20-0e21235dbb58#/image-slot.js\" id=\"bio-slide-3\" shape=\"rect\" src=\"uploads/bio-slide-3.webp\" placeholder=\"Drop photo 3\" hint-size=\"520px,680px\" style=\"position:absolute;inset:0;\"><\u002Fx-import>\n    <\u002Fdiv>\n    <div class=\"bio-fader\" style=\"position:absolute;inset:0;animation:slideshowFade 15s linear infinite;z-index:3;\">\n      <x-import component-from-global-scope=\"image-slot\" from=\"4f15e0b1-38a5-4457-bd20-0e21235dbb58#/image-slot.js\" id=\"bio-slide-1\" shape=\"rect\" src=\"uploads/bio-slide-1.webp\" placeholder=\"Drop photo 1\" hint-size=\"520px,680px\" style=\"position:absolute;inset:0;\"><\u002Fx-import>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"flex:1;\">\n    <div style=\"font-family:'Space Mono',monospace;font-size:24px;letter-spacing:4px;color:#9DE84B;margin-bottom:24px;\">// 03 · WHO'S TALKING<\u002Fdiv>\n    <h2 style=\"font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:88px;line-height:1.0;margin:0;\">Hi, I'm Eric<\u002Fh2>\n    <p style=\"font-size:36px;line-height:1.45;color:#C9BEDA;margin:40px 0 0;max-width:1000px;\">Software engineer &amp; lifelong tinkerer. I've been taking things apart and rebuilding them since I was a kid.<\u002Fp>\n    <ul style=\"list-style:none;padding:0;margin:44px 0 0;display:flex;flex-direction:column;gap:24px;max-width:1000px;\">\n      <li style=\"display:flex;align-items:flex-start;gap:20px;font-size:32px;line-height:1.35;color:#ECE6F4;\"><span style=\"flex:0 0 auto;margin-top:12px;width:11px;height:11px;border-radius:50%;background:#C96BFF;box-shadow:0 0 12px rgba(201,107,255,.7);\"><\u002Fspan><span>Psy &amp; goa festivals <span style=\"color:#C96BFF;\">since the turn of the millennium<\u002Fspan> — first with friends…<\u002Fspan><\u002Fli>\n      <li style=\"display:flex;align-items:flex-start;gap:20px;font-size:32px;line-height:1.35;color:#ECE6F4;\"><span style=\"flex:0 0 auto;margin-top:12px;width:11px;height:11px;border-radius:50%;background:#FF8A3D;box-shadow:0 0 12px rgba(255,138,61,.7);\"><\u002Fspan><span>…now with my <span style=\"color:#FF8A3D;\">family<\u002Fspan> — a dad who camps, sometimes far from the rest of the camp.<\u002Fspan><\u002Fli>\n      <li style=\"display:flex;align-items:flex-start;gap:20px;font-size:32px;line-height:1.35;color:#ECE6F4;\"><span style=\"flex:0 0 auto;margin-top:12px;width:11px;height:11px;border-radius:50%;background:#4FD6FF;box-shadow:0 0 12px rgba(79,214,255,.7);\"><\u002Fspan><span>Back to tinkering with electronics — using AI as my teacher.<\u002Fspan><\u002Fli>\n      <li style=\"display:flex;align-items:flex-start;gap:20px;font-size:32px;line-height:1.35;color:#ECE6F4;\"><span style=\"flex:0 0 auto;margin-top:12px;width:11px;height:11px;border-radius:50%;background:#9DE84B;box-shadow:0 0 12px rgba(157,232,75,.7);\"><\u002Fspan><span>Helped build cloud infrastructure systems for <span style=\"color: rgb(157, 232, 75);\">Mo:Dem<\u002Fspan>.<\u002Fspan><\u002Fli>\n    <\u002Ful>\n    <p style=\"font-size:30px;line-height:1.4;color:#9A8BB2;margin:48px 0 0;max-width:1000px;font-style:italic;\">I think technology is best when it's <span style=\"color:#ECE6F4;font-style:normal;\">simple, hidden, and serves the people.<\u002Fspan><\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Your Phone Is Hungry\" data-screen-label=\"04 Why\" data-speaker-notes=\"Not anti-phone — anti-business-model. The phone is a miracle of engineering; the problem is the attention economy layered on top, engineered to maximise time-on-screen. Contrast that with the thing we'll build: single-purpose, no feed, no ads, no algorithm — it does one job and then gets out of your way. Flag the three audiences here so people self-identify early (this pays off on the 'Which one are you' slide near the end): the tribe finding each other, the parents staying reachable, and the preppers who want a network that works when everything else is down.\" style=\"box-sizing:border-box;padding:90px 110px 80px;background:#0E0A18;color:#ECE6F4;font-family:'Space Grotesk',sans-serif;display:flex;flex-direction:column;justify-content:center;overflow:hidden;\">\n  <div style=\"font-family:'Space Mono',monospace;font-size:24px;letter-spacing:4px;color:#9DE84B;margin-bottom:24px;\">// 04 · WHY THIS MATTERS<\u002Fdiv>\n  <h2 style=\"font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:88px;line-height:1.0;margin:0;max-width:1500px;\">Your phone is <span style=\"color:#FF8A3D;\">hungry<\u002Fspan><\u002Fh2>\n  <p style=\"font-size:38px;line-height:1.4;color:#C9BEDA;margin:36px 0 0;max-width:1300px;\">Even with bars, your phone isn't built to just pass a note to your friend. It's built to eat your attention — notifications, feeds, endless things to scroll — every time you unlock it to send one message.<\u002Fp>\n  <div style=\"margin-top:56px;background:#150E26;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:32px 40px;font-size:32px;line-height:1.4;color:#ECE6F4;max-width:1400px;\"><span style=\"color:#9DE84B;font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:26px;margin-right:14px;\">SO →<\u002Fspan>what if the device in your pocket for this one job did nothing else? <span style=\"color:#9A8BB2;\">Tonight, I'm building one.<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"The Plan\" data-screen-label=\"05 Roadmap\" data-speaker-notes=\"Roadmap slide — tell them where we're going so the theory feels earned. The destination: a device smaller than a candy bar that pairs with your phone and passes messages straight to your friends' devices — no cell tower, no SIM, no monthly bill, works with zero bars. The slide shows three short stops — how networks work, the secret radio, build one or join one — and one expectation line: twenty minutes of how, then you'll know enough to build one or join ours. Say the theory is short so nobody dreads it, and land the payoff: leave able to build your own or join the mesh we already run.\" style=\"box-sizing:border-box;padding:90px 110px 80px;background:#0E0A18;color:#ECE6F4;font-family:'Space Grotesk',sans-serif;display:flex;flex-direction:column;justify-content:center;overflow:hidden;\">\n  <div style=\"font-family:'Space Mono',monospace;font-size:24px;letter-spacing:4px;color:#9DE84B;margin-bottom:24px;\">// 05 · THE PLAN<\u002Fdiv>\n  <h2 style=\"font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:80px;line-height:1.05;margin:0;max-width:1500px;\">A radio smaller than a candy bar. <span style=\"color:#9DE84B;\">No towers. No bill.<\u002Fspan><\u002Fh2>\n  <p style=\"font-size:34px;line-height:1.4;color:#9A8BB2;margin:32px 0 0;max-width:1300px;\">Twenty minutes of how — then you'll know enough to build one or join ours.<\u002Fp>\n  <div style=\"display:flex;gap:28px;margin-top:48px;\">\n    <div style=\"flex:1;background:#1A1230;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:36px;border-top:3px solid #4FD6FF;\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:22px;color:#4FD6FF;margin-bottom:14px;\">01<\u002Fdiv>\n      <div style=\"font-family:'Chakra Petch',sans-serif;font-size:32px;color:#ECE6F4;\">How networks work<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;background:#1A1230;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:36px;border-top:3px solid #9DE84B;\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:22px;color:#9DE84B;margin-bottom:14px;\">02<\u002Fdiv>\n      <div style=\"font-family:'Chakra Petch',sans-serif;font-size:32px;color:#ECE6F4;\">The secret radio<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;background:#1A1230;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:36px;border-top:3px solid #FF8A3D;\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:22px;color:#FF8A3D;margin-bottom:14px;\">03<\u002Fdiv>\n      <div style=\"font-family:'Chakra Petch',sans-serif;font-size:32px;color:#ECE6F4;\">Build one or join one<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Centralized Networks\" data-screen-label=\"06 Centralized\" data-speaker-notes=\"Demystify the word 'network' before any diagram — it's just devices passing notes, like whispering down a row of friends. The only thing that matters is the shape: who hands to whom. Introduce shape one, centralized: every message routes through a middle that somebody owns and pays for — a cell tower, a server. Use the animation: point out the absurdity that a text to the person standing right next to you travels all the way up to the tower and back down. That round-trip is the weakness — if the middle is congested, down, or switched off, you're cut off even from someone an arm's length away. This sets up why mesh is better. Keep it concrete, avoid the word 'topology'.\" style=\"box-sizing:border-box;padding:80px 110px 70px;background:#0E0A18;color:#ECE6F4;font-family:'Space Grotesk',sans-serif;display:flex;flex-direction:column;overflow:hidden;\">\n  <div style=\"font-family:'Space Mono',monospace;font-size:24px;letter-spacing:4px;color:#9DE84B;margin-bottom:20px;\">// 06 · NETWORKING 101<\u002Fdiv>\n  <h2 style=\"font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:72px;line-height:1.0;margin:0;\">One boss in the middle<\u002Fh2>\n  <p style=\"font-size:32px;line-height:1.4;color:#9A8BB2;margin:22px 0 0;max-width:1400px;\">One owner in the middle — your message to the friend <span style=\"color:#ECE6F4;\">right next to you<\u002Fspan> travels up the tower and all the way back down.<\u002Fp>\n  <div style=\"flex:1;margin-top:30px;background:#150E26;border:1px solid rgba(255,255,255,.07);border-radius:16px;position:relative;overflow:hidden;\">\n    <svg sc-camel-view-box=\"0 0 1400 520\" width=\"100%\" height=\"100%\" sc-camel-preserve-aspect-ratio=\"xMidYMid meet\" style=\"position:absolute;inset:0;\">\n      <g stroke=\"#FF8A3D\" stroke-width=\"2.5\" opacity=\"0.45\">\n        <line x1=\"700\" y1=\"130\" x2=\"380\" y2=\"300\"><\u002Fline>\n        <line x1=\"700\" y1=\"130\" x2=\"1020\" y2=\"300\"><\u002Fline>\n        <line x1=\"380\" y1=\"300\" x2=\"230\" y2=\"440\"><\u002Fline>\n        <line x1=\"380\" y1=\"300\" x2=\"440\" y2=\"440\"><\u002Fline>\n        <line x1=\"1020\" y1=\"300\" x2=\"960\" y2=\"440\"><\u002Fline>\n        <line x1=\"1020\" y1=\"300\" x2=\"1170\" y2=\"440\"><\u002Fline>\n      <\u002Fg>\n      <!-- pulse A: successful round trip 1 (0-5s of 18s cycle) -->\n      <circle r=\"11\" fill=\"#4FD6FF\" style=\"filter:drop-shadow(0 0 8px #4FD6FF);\">\n        <animateMotion dur=\"18s\" sc-camel-repeat-count=\"indefinite\" sc-camel-calc-mode=\"linear\" sc-camel-key-points=\"0;0;1;1\" sc-camel-key-times=\"0;0.02;0.26;1\" path=\"M 230 440 L 380 300 L 700 130 L 380 300 L 440 440\"><\u002FanimateMotion>\n        <animate sc-camel-attribute-name=\"opacity\" dur=\"18s\" sc-camel-repeat-count=\"indefinite\" values=\"0;1;1;0;0\" sc-camel-key-times=\"0;0.02;0.24;0.27;1\"><\u002Fanimate>\n      <\u002Fcircle>\n      <!-- pulse B: successful round trip 2 (6-11s) -->\n      <circle r=\"11\" fill=\"#4FD6FF\" opacity=\"0\" style=\"filter:drop-shadow(0 0 8px #4FD6FF);\">\n        <animateMotion dur=\"18s\" sc-camel-repeat-count=\"indefinite\" sc-camel-calc-mode=\"linear\" sc-camel-key-points=\"0;0;1;1\" sc-camel-key-times=\"0;0.34;0.58;1\" path=\"M 230 440 L 380 300 L 700 130 L 380 300 L 440 440\"><\u002FanimateMotion>\n        <animate sc-camel-attribute-name=\"opacity\" dur=\"18s\" sc-camel-repeat-count=\"indefinite\" values=\"0;0;1;1;0;0\" sc-camel-key-times=\"0;0.34;0.36;0.56;0.59;1\"><\u002Fanimate>\n      <\u002Fcircle>\n      <!-- pulse C: failed attempt (12-16s) — HQ is offline, message dies at the relay -->\n      <circle r=\"11\" fill=\"#FF5A4A\" opacity=\"0\" style=\"filter:drop-shadow(0 0 8px #FF5A4A);\">\n        <animateMotion dur=\"18s\" sc-camel-repeat-count=\"indefinite\" sc-camel-calc-mode=\"linear\" sc-camel-key-points=\"0;0;1;1\" sc-camel-key-times=\"0;0.7;0.82;1\" path=\"M 230 440 L 380 300\"><\u002FanimateMotion>\n        <animate sc-camel-attribute-name=\"opacity\" dur=\"18s\" sc-camel-repeat-count=\"indefinite\" values=\"0;0;1;1;1;0;1;0;0\" sc-camel-key-times=\"0;0.7;0.72;0.82;0.85;0.88;0.91;0.94;1\"><\u002Fanimate>\n      <\u002Fcircle>\n      <!-- hub: goes offline at 12s, back at 18s -->\n      <g>\n        <animate sc-camel-attribute-name=\"opacity\" dur=\"18s\" sc-camel-repeat-count=\"indefinite\" values=\"1;1;0.18;0.18;1\" sc-camel-key-times=\"0;0.66;0.68;0.98;1\"><\u002Fanimate>\n        <circle cx=\"700\" cy=\"130\" r=\"46\" fill=\"#FF8A3D\" style=\"filter:drop-shadow(0 0 22px rgba(255,138,61,.8));\"><\u002Fcircle>\n        <text x=\"700\" y=\"142\" text-anchor=\"middle\" font-family=\"Space Mono, monospace\" font-size=\"30\" font-weight=\"700\" fill=\"#0E0A18\">HQ<\u002Ftext>\n        <text x=\"700\" y=\"62\" text-anchor=\"middle\" font-family=\"Space Mono, monospace\" font-size=\"24\" fill=\"#FF8A3D\">the owned middle<animate sc-camel-attribute-name=\"opacity\" dur=\"18s\" sc-camel-repeat-count=\"indefinite\" values=\"1;1;0;0;1\" sc-camel-key-times=\"0;0.66;0.68;0.98;1\"><\u002Fanimate><\u002Ftext>\n      <\u002Fg>\n      <!-- offline marker: visible only 12-18s -->\n      <g opacity=\"0\">\n        <animate sc-camel-attribute-name=\"opacity\" dur=\"18s\" sc-camel-repeat-count=\"indefinite\" values=\"0;0;1;1;0\" sc-camel-key-times=\"0;0.68;0.7;0.97;1\"><\u002Fanimate>\n        <circle cx=\"700\" cy=\"130\" r=\"46\" fill=\"#2A1A1A\" stroke=\"#FF5A4A\" stroke-width=\"3\"><\u002Fcircle>\n        <text x=\"700\" y=\"145\" text-anchor=\"middle\" font-family=\"Space Mono, monospace\" font-size=\"40\" fill=\"#FF5A4A\">✕<\u002Ftext>\n        <text x=\"700\" y=\"62\" text-anchor=\"middle\" font-family=\"Space Mono, monospace\" font-size=\"24\" fill=\"#FF5A4A\">HQ offline — nobody gets through<\u002Ftext>\n      <\u002Fg>\n      <!-- relays -->\n      <circle cx=\"380\" cy=\"300\" r=\"26\" fill=\"#3A2D52\" stroke=\"#FF8A3D\" stroke-width=\"3\"><\u002Fcircle>\n      <circle cx=\"1020\" cy=\"300\" r=\"26\" fill=\"#3A2D52\" stroke=\"#FF8A3D\" stroke-width=\"3\"><\u002Fcircle>\n      <!-- leaves -->\n      <circle cx=\"230\" cy=\"440\" r=\"18\" fill=\"#4FD6FF\" style=\"filter:drop-shadow(0 0 10px rgba(79,214,255,.7));\"><\u002Fcircle>\n      <circle cx=\"440\" cy=\"440\" r=\"18\" fill=\"#4FD6FF\" style=\"filter:drop-shadow(0 0 10px rgba(79,214,255,.7));\"><\u002Fcircle>\n      <circle cx=\"960\" cy=\"440\" r=\"18\" fill=\"#3A2D52\" stroke=\"#6B5B86\" stroke-width=\"3\"><\u002Fcircle>\n      <circle cx=\"1170\" cy=\"440\" r=\"18\" fill=\"#3A2D52\" stroke=\"#6B5B86\" stroke-width=\"3\"><\u002Fcircle>\n      <!-- radar pings on endpoints -->\n      <circle cx=\"230\" cy=\"440\" r=\"18\" fill=\"none\" stroke=\"#4FD6FF\" stroke-width=\"2.5\">\n        <animate sc-camel-attribute-name=\"r\" dur=\"3s\" sc-camel-repeat-count=\"indefinite\" values=\"18;52\"><\u002Fanimate>\n        <animate sc-camel-attribute-name=\"opacity\" dur=\"3s\" sc-camel-repeat-count=\"indefinite\" values=\"0.7;0\"><\u002Fanimate>\n      <\u002Fcircle>\n      <circle cx=\"440\" cy=\"440\" r=\"18\" fill=\"none\" stroke=\"#4FD6FF\" stroke-width=\"2.5\">\n        <animate sc-camel-attribute-name=\"r\" dur=\"3s\" begin=\"1.5s\" sc-camel-repeat-count=\"indefinite\" values=\"18;52\"><\u002Fanimate>\n        <animate sc-camel-attribute-name=\"opacity\" dur=\"3s\" begin=\"1.5s\" sc-camel-repeat-count=\"indefinite\" values=\"0.7;0\"><\u002Fanimate>\n      <\u002Fcircle>\n      <text x=\"230\" y=\"495\" text-anchor=\"middle\" font-family=\"Space Mono, monospace\" font-size=\"24\" fill=\"#4FD6FF\">you<\u002Ftext>\n      <text x=\"440\" y=\"495\" text-anchor=\"middle\" font-family=\"Space Mono, monospace\" font-size=\"24\" fill=\"#4FD6FF\">your friend<\u002Ftext>\n    <\u002Fsvg>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Mesh Networks\" data-screen-label=\"07 Mesh\" data-speaker-notes=\"The payoff shape. Mesh = no middle, every device relays for its neighbours, so the network belongs to everyone and no one. Walk the animation deliberately in two beats: beat one, message hops through the middle node and arrives — easy. Beat two, that middle node's battery dies (tap it), and instead of the network failing, the message just reroutes the long way — three hops, still delivered. That self-healing is the magic: no single point to seize, congest, or switch off. More devices actually makes a mesh stronger and wider, not slower — the opposite of one overloaded tower. This is the core idea of the whole talk; slow down here.\" style=\"box-sizing:border-box;padding:80px 110px 70px;background:#0E0A18;color:#ECE6F4;font-family:'Space Grotesk',sans-serif;display:flex;flex-direction:column;overflow:hidden;\">\n  <div style=\"font-family:'Space Mono',monospace;font-size:24px;letter-spacing:4px;color:#9DE84B;margin-bottom:20px;\">// 07 · NETWORKING 101<\u002Fdiv>\n  <h2 style=\"font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:72px;line-height:1.0;margin:0;\">Mesh: no middle, no boss<\u002Fh2>\n  <p style=\"font-size:32px;line-height:1.4;color:#9A8BB2;margin:22px 0 0;max-width:1400px;\">Every device passes messages on for its neighbours. One device dies — <span style=\"color:#ECE6F4;\">the message finds another way around.<\u002Fspan><\u002Fp>\n  <div style=\"flex:1;margin-top:30px;background:#150E26;border:1px solid rgba(255,255,255,.07);border-radius:16px;position:relative;overflow:hidden;\">\n    <svg sc-camel-view-box=\"0 0 1400 520\" width=\"100%\" height=\"100%\" sc-camel-preserve-aspect-ratio=\"xMidYMid meet\" style=\"position:absolute;inset:0;\">\n      <g stroke=\"#9DE84B\" stroke-width=\"2.5\" opacity=\"0.4\">\n        <line x1=\"180\" y1=\"260\" x2=\"420\" y2=\"120\"><\u002Fline>\n        <line x1=\"180\" y1=\"260\" x2=\"430\" y2=\"400\"><\u002Fline>\n        <line x1=\"420\" y1=\"120\" x2=\"700\" y2=\"230\"><\u002Fline>\n        <line x1=\"430\" y1=\"400\" x2=\"700\" y2=\"230\"><\u002Fline>\n        <line x1=\"420\" y1=\"120\" x2=\"760\" y2=\"80\"><\u002Fline>\n        <line x1=\"760\" y1=\"80\" x2=\"1040\" y2=\"160\"><\u002Fline>\n        <line x1=\"700\" y1=\"230\" x2=\"1040\" y2=\"160\"><\u002Fline>\n        <line x1=\"430\" y1=\"400\" x2=\"820\" y2=\"430\"><\u002Fline>\n        <line x1=\"700\" y1=\"230\" x2=\"820\" y2=\"430\"><\u002Fline>\n        <line x1=\"820\" y1=\"430\" x2=\"1180\" y2=\"330\"><\u002Fline>\n        <line x1=\"1040\" y1=\"160\" x2=\"1180\" y2=\"330\"><\u002Fline>\n      <\u002Fg>\n      <!-- direct route through the middle node (alive phase) -->\n      <g stroke=\"#9DE84B\" stroke-width=\"2.5\" opacity=\"0.4\">\n        <line x1=\"180\" y1=\"260\" x2=\"700\" y2=\"230\"><\u002Fline>\n        <line x1=\"700\" y1=\"230\" x2=\"1180\" y2=\"330\"><\u002Fline>\n        <animate sc-camel-attribute-name=\"opacity\" dur=\"20s\" sc-camel-repeat-count=\"indefinite\" values=\"0.4;0.4;0.08;0.08;0.4\" sc-camel-key-times=\"0;0.45;0.47;0.97;1\"><\u002Fanimate>\n      <\u002Fg>\n      <!-- dead-route dashes, only while the node is offline -->\n      <g stroke=\"#FF5A4A\" stroke-width=\"2.5\" stroke-dasharray=\"6 8\" opacity=\"0\">\n        <line x1=\"180\" y1=\"260\" x2=\"700\" y2=\"230\"><\u002Fline>\n        <line x1=\"700\" y1=\"230\" x2=\"1180\" y2=\"330\"><\u002Fline>\n        <animate sc-camel-attribute-name=\"opacity\" dur=\"20s\" sc-camel-repeat-count=\"indefinite\" values=\"0;0;0.4;0.4;0\" sc-camel-key-times=\"0;0.45;0.47;0.97;1\"><\u002Fanimate>\n      <\u002Fg>\n      <!-- pulse A: 1-hop delivery, trip 1 (0-4s of 20s) -->\n      <circle r=\"11\" fill=\"#4FD6FF\" style=\"filter:drop-shadow(0 0 8px #4FD6FF);\">\n        <animateMotion dur=\"20s\" sc-camel-repeat-count=\"indefinite\" sc-camel-calc-mode=\"linear\" sc-camel-key-points=\"0;0;1;1\" sc-camel-key-times=\"0;0.01;0.2;1\" path=\"M 180 260 L 700 230 L 1180 330\"><\u002FanimateMotion>\n        <animate sc-camel-attribute-name=\"opacity\" dur=\"20s\" sc-camel-repeat-count=\"indefinite\" values=\"0;1;1;0;0\" sc-camel-key-times=\"0;0.01;0.19;0.21;1\"><\u002Fanimate>\n      <\u002Fcircle>\n      <!-- pulse B: 1-hop delivery, trip 2 (4.5-8.5s) -->\n      <circle r=\"11\" fill=\"#4FD6FF\" opacity=\"0\" style=\"filter:drop-shadow(0 0 8px #4FD6FF);\">\n        <animateMotion dur=\"20s\" sc-camel-repeat-count=\"indefinite\" sc-camel-calc-mode=\"linear\" sc-camel-key-points=\"0;0;1;1\" sc-camel-key-times=\"0;0.23;0.42;1\" path=\"M 180 260 L 700 230 L 1180 330\"><\u002FanimateMotion>\n        <animate sc-camel-attribute-name=\"opacity\" dur=\"20s\" sc-camel-repeat-count=\"indefinite\" values=\"0;0;1;1;0;0\" sc-camel-key-times=\"0;0.23;0.24;0.41;0.43;1\"><\u002Fanimate>\n      <\u002Fcircle>\n      <!-- pulse C: node offline — message reroutes, 3 hops, still arrives (10-17s) -->\n      <circle r=\"11\" fill=\"#4FD6FF\" opacity=\"0\" style=\"filter:drop-shadow(0 0 8px #4FD6FF);\">\n        <animateMotion dur=\"20s\" sc-camel-repeat-count=\"indefinite\" sc-camel-calc-mode=\"linear\" sc-camel-key-points=\"0;0;1;1\" sc-camel-key-times=\"0;0.5;0.85;1\" path=\"M 180 260 L 430 400 L 820 430 L 1180 330\"><\u002FanimateMotion>\n        <animate sc-camel-attribute-name=\"opacity\" dur=\"20s\" sc-camel-repeat-count=\"indefinite\" values=\"0;0;1;1;0;0\" sc-camel-key-times=\"0;0.5;0.51;0.84;0.86;1\"><\u002Fanimate>\n      <\u002Fcircle>\n      <!-- nodes -->\n      <!-- radar pings on you / your friend -->\n      <circle cx=\"180\" cy=\"260\" r=\"20\" fill=\"none\" stroke=\"#4FD6FF\" stroke-width=\"2.5\">\n        <animate sc-camel-attribute-name=\"r\" dur=\"3.2s\" sc-camel-repeat-count=\"indefinite\" values=\"20;60\"><\u002Fanimate>\n        <animate sc-camel-attribute-name=\"opacity\" dur=\"3.2s\" sc-camel-repeat-count=\"indefinite\" values=\"0.7;0\"><\u002Fanimate>\n      <\u002Fcircle>\n      <circle cx=\"1180\" cy=\"330\" r=\"20\" fill=\"none\" stroke=\"#4FD6FF\" stroke-width=\"2.5\">\n        <animate sc-camel-attribute-name=\"r\" dur=\"3.2s\" begin=\"1.6s\" sc-camel-repeat-count=\"indefinite\" values=\"20;60\"><\u002Fanimate>\n        <animate sc-camel-attribute-name=\"opacity\" dur=\"3.2s\" begin=\"1.6s\" sc-camel-repeat-count=\"indefinite\" values=\"0.7;0\"><\u002Fanimate>\n      <\u002Fcircle>\n      <circle cx=\"180\" cy=\"260\" r=\"20\" fill=\"#4FD6FF\" style=\"filter:drop-shadow(0 0 12px rgba(79,214,255,.7));\"><\u002Fcircle>\n      <text x=\"180\" y=\"315\" text-anchor=\"middle\" font-family=\"Space Mono, monospace\" font-size=\"24\" fill=\"#4FD6FF\">you<\u002Ftext>\n      <circle cx=\"420\" cy=\"120\" r=\"17\" fill=\"#9DE84B\" style=\"filter:drop-shadow(0 0 10px rgba(157,232,75,.7));\"><\u002Fcircle>\n      <circle cx=\"430\" cy=\"400\" r=\"17\" fill=\"#9DE84B\" style=\"filter:drop-shadow(0 0 10px rgba(157,232,75,.7));\"><\u002Fcircle>\n      <circle cx=\"760\" cy=\"80\" r=\"17\" fill=\"#9DE84B\" style=\"filter:drop-shadow(0 0 10px rgba(157,232,75,.7));\"><\u002Fcircle>\n      <circle cx=\"820\" cy=\"430\" r=\"17\" fill=\"#9DE84B\" style=\"filter:drop-shadow(0 0 10px rgba(157,232,75,.7));\"><\u002Fcircle>\n      <circle cx=\"1040\" cy=\"160\" r=\"17\" fill=\"#9DE84B\" style=\"filter:drop-shadow(0 0 10px rgba(157,232,75,.7));\"><\u002Fcircle>\n      <!-- middle node: alive first, then battery dies -->\n      <g>\n        <animate sc-camel-attribute-name=\"opacity\" dur=\"20s\" sc-camel-repeat-count=\"indefinite\" values=\"1;1;0;0;1\" sc-camel-key-times=\"0;0.44;0.46;0.97;1\"><\u002Fanimate>\n        <circle cx=\"700\" cy=\"230\" r=\"20\" fill=\"#9DE84B\" style=\"filter:drop-shadow(0 0 12px rgba(157,232,75,.7));\"><\u002Fcircle>\n      <\u002Fg>\n      <g opacity=\"0\">\n        <animate sc-camel-attribute-name=\"opacity\" dur=\"20s\" sc-camel-repeat-count=\"indefinite\" values=\"0;0;1;1;0\" sc-camel-key-times=\"0;0.45;0.47;0.97;1\"><\u002Fanimate>\n        <circle cx=\"700\" cy=\"230\" r=\"20\" fill=\"#2A1A1A\" stroke=\"#FF5A4A\" stroke-width=\"3\"><\u002Fcircle>\n        <text x=\"700\" y=\"241\" text-anchor=\"middle\" font-family=\"Space Mono, monospace\" font-size=\"28\" fill=\"#FF5A4A\">✕<\u002Ftext>\n        <text x=\"700\" y=\"188\" text-anchor=\"middle\" font-family=\"Space Mono, monospace\" font-size=\"24\" fill=\"#FF5A4A\">battery died<\u002Ftext>\n      <\u002Fg>\n      <circle cx=\"1180\" cy=\"330\" r=\"20\" fill=\"#4FD6FF\" style=\"filter:drop-shadow(0 0 12px rgba(79,214,255,.7));\"><\u002Fcircle>\n      <text x=\"1180\" y=\"385\" text-anchor=\"middle\" font-family=\"Space Mono, monospace\" font-size=\"24\" fill=\"#4FD6FF\">your friend<\u002Ftext>\n    <\u002Fsvg>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Meshes Are Everywhere\" data-screen-label=\"08 Meshes\" data-speaker-notes=\"Reassure the skeptics: mesh isn't fringe or experimental, it's the backbone of tech they already trust. The internet itself is a giant mesh of routers finding paths around outages — it was literally designed to survive parts going down. Even behind 5G and the mobile network, the core routers relay traffic hop to hop as a mesh; the centralized part is only the last leg to the tower. And a modern example people have at home: mesh Wi-Fi systems (Eero, Google Nest, Deco) where the nodes relay for each other to cover the whole house — same trick, smaller scale. Slide shows one line — you carry the examples verbally. Conclusion: the concept is battle-tested; the only open question for us is the physical link between our little boxes. Tee up the answer — radio — and move on.\" style=\"box-sizing:border-box;padding:80px 110px 70px;background:#0E0A18;color:#ECE6F4;font-family:'Space Grotesk',sans-serif;display:flex;flex-direction:column;overflow:hidden;\">\n  <div style=\"font-family:'Space Mono',monospace;font-size:24px;letter-spacing:4px;color:#9DE84B;margin-bottom:20px;\">// 08 · YOU ALREADY USE THESE<\u002Fdiv>\n  <h2 style=\"font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:72px;line-height:1.0;margin:0;\">Meshes are everywhere<\u002Fh2>\n  <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;margin-top:44px;\">\n    <p style=\"font-size:44px;line-height:1.45;color:#C9BEDA;margin:0;max-width:1500px;text-wrap:pretty;\">You already trust meshes: <span style=\"color:#4FD6FF;\">the internet<\u002Fspan>, <span style=\"color:#FF8A3D;\">the 5G core<\u002Fspan>, <span style=\"color:#C96BFF;\">the Wi-Fi in your house<\u002Fspan>. Proven tech — you just never see it.<\u002Fp>\n  <\u002Fdiv>\n  <div style=\"margin-top:36px;margin-bottom:20px;background:#150E26;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:30px 40px;font-size:30px;line-height:1.4;color:#ECE6F4;\"><span style=\"color:#9DE84B;font-family:'Space Mono',monospace;font-size:26px;\">SO →<\u002Fspan> &nbsp;meshes are proven tech. The only question left: <span style=\"color:#9A8BB2;\">how do our little radios talk to each other?<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"What Is a Radio Wave?\" data-screen-label=\"09 Radio\" data-speaker-notes=\"Bridge slide: if we've removed the towers and the wires, what physically carries the message between boxes? Radio waves — the same invisible medium as FM, Wi-Fi, and your car key fob. Keep the physics friendly: a radio wave is energy rippling through the air, and we encode information by wiggling it (that wiggle rate is 'frequency'). The one fact that matters for later: slower wiggles (lower frequency) travel further and bend around obstacles; faster wiggles carry more data but fade fast. That single trade-off — range versus data-rate — is what the next slide is built on, and it's the reason our radios can be so far-reaching. Don't over-explain; the animation carries it.\" style=\"box-sizing:border-box;padding:80px 110px 70px;background:radial-gradient(120% 130% at 85% 50%, #1B1430 0%, #0E0A18 60%);color:#ECE6F4;font-family:'Space Grotesk',sans-serif;display:flex;flex-direction:column;overflow:hidden;\">\n  <div style=\"font-family:'Space Mono',monospace;font-size:24px;letter-spacing:4px;color:#9DE84B;margin-bottom:20px;\">// 09 · THE INVISIBLE PART<\u002Fdiv>\n  <h2 style=\"font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:72px;line-height:1.0;margin:0;\">Slow waves travel further<\u002Fh2>\n  <p style=\"font-size:36px;line-height:1.4;color:#C9BEDA;margin:32px 0 0;max-width:1300px;\">Invisible waves moving through the air. We shake them in a pattern to carry information — and <span style=\"color:#9DE84B;\">slow waves travel further<\u002Fspan>.<\u002Fp>\n  <p style=\"font-size:30px;line-height:1.4;color:#9A8BB2;margin:22px 0 0;max-width:1300px;\">Smoke signals were the first version: simple signs, visible for kilometres, saying just enough. We do the same thing — <span style=\"color:#ECE6F4;\">digital smoke signals<\u002Fspan>.<\u002Fp>\n  <div style=\"flex:1;margin-top:26px;background:#150E26;border:1px solid rgba(255,255,255,.07);border-radius:16px;position:relative;overflow:hidden;\">\n    <svg sc-camel-view-box=\"0 0 1560 460\" width=\"100%\" height=\"100%\" sc-camel-preserve-aspect-ratio=\"xMidYMid meet\" style=\"position:absolute;inset:0;\">\n      <defs>\n        <linearGradient id=\"fadeCyan\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"0\">\n          <stop offset=\"0\" stop-color=\"#4FD6FF\" stop-opacity=\"0.9\"><\u002Fstop>\n          <stop offset=\"0.45\" stop-color=\"#4FD6FF\" stop-opacity=\"0.5\"><\u002Fstop>\n          <stop offset=\"0.62\" stop-color=\"#4FD6FF\" stop-opacity=\"0\"><\u002Fstop>\n          <stop offset=\"1\" stop-color=\"#4FD6FF\" stop-opacity=\"0\"><\u002Fstop>\n        <\u002FlinearGradient>\n      <\u002Fdefs>\n      <!-- sender antenna -->\n      <g>\n        <line x1=\"150\" y1=\"330\" x2=\"150\" y2=\"170\" stroke=\"#FF8A3D\" stroke-width=\"8\" stroke-linecap=\"round\"><\u002Fline>\n        <line x1=\"118\" y1=\"330\" x2=\"182\" y2=\"330\" stroke=\"#FF8A3D\" stroke-width=\"8\" stroke-linecap=\"round\"><\u002Fline>\n        <circle cx=\"150\" cy=\"150\" r=\"16\" fill=\"#FF8A3D\" style=\"filter:drop-shadow(0 0 14px rgba(255,138,61,.9));\"><\u002Fcircle>\n        <circle cx=\"150\" cy=\"150\" r=\"16\" fill=\"none\" stroke=\"#FF8A3D\" stroke-width=\"3\">\n          <animate sc-camel-attribute-name=\"r\" dur=\"2s\" sc-camel-repeat-count=\"indefinite\" values=\"16;60\"><\u002Fanimate>\n          <animate sc-camel-attribute-name=\"opacity\" dur=\"2s\" sc-camel-repeat-count=\"indefinite\" values=\"0.8;0\"><\u002Fanimate>\n        <\u002Fcircle>\n        <circle cx=\"150\" cy=\"150\" r=\"16\" fill=\"none\" stroke=\"#FF8A3D\" stroke-width=\"3\">\n          <animate sc-camel-attribute-name=\"r\" dur=\"2s\" begin=\"1s\" sc-camel-repeat-count=\"indefinite\" values=\"16;60\"><\u002Fanimate>\n          <animate sc-camel-attribute-name=\"opacity\" dur=\"2s\" begin=\"1s\" sc-camel-repeat-count=\"indefinite\" values=\"0.8;0\"><\u002Fanimate>\n        <\u002Fcircle>\n        <text x=\"150\" y=\"400\" text-anchor=\"middle\" font-family=\"Space Mono, monospace\" font-size=\"26\" fill=\"#FF8A3D\">sender<\u002Ftext>\n      <\u002Fg>\n      <!-- fast wave: dies mid-air -->\n      <path d=\"M 240 140 q 20 -55 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0 t 40 0\" fill=\"none\" stroke=\"url(#fadeCyan)\" stroke-width=\"5\" stroke-dasharray=\"12 10\" style=\"animation:dashmove 1.2s linear infinite;\"><\u002Fpath>\n      <text x=\"240\" y=\"72\" font-family=\"Space Mono, monospace\" font-size=\"25\" fill=\"#4FD6FF\">FAST WAVES · lots of data (Wi-Fi) · die quickly<\u002Ftext>\n      <text x=\"880\" y=\"130\" font-family=\"Space Mono, monospace\" font-size=\"25\" fill=\"#5A4A6E\">…gone ✕<\u002Ftext>\n      <!-- slow wave: reaches the receiver -->\n      <path d=\"M 240 310 q 80 -110 160 0 t 160 0 t 160 0 t 160 0 t 160 0 t 160 0 t 160 0\" fill=\"none\" stroke=\"#9DE84B\" stroke-width=\"5\" opacity=\"0.85\" stroke-dasharray=\"14 12\" style=\"animation:dashmove 3s linear infinite;filter:drop-shadow(0 0 8px rgba(157,232,75,.5));\"><\u002Fpath>\n      <text x=\"240\" y=\"242\" font-family=\"Space Mono, monospace\" font-size=\"25\" fill=\"#9DE84B\">SLOW WAVES · just text · travel far ✓<\u002Ftext>\n      <!-- receiver -->\n      <g>\n        <rect x=\"1410\" y=\"250\" width=\"70\" height=\"120\" rx=\"14\" fill=\"#241836\" stroke=\"#9DE84B\" stroke-width=\"4\" style=\"filter:drop-shadow(0 0 16px rgba(157,232,75,.5));\"><\u002Frect>\n        <rect x=\"1424\" y=\"268\" width=\"42\" height=\"66\" rx=\"4\" fill=\"#9DE84B\" opacity=\"0.25\">\n          <animate sc-camel-attribute-name=\"opacity\" dur=\"3s\" sc-camel-repeat-count=\"indefinite\" values=\"0.25;0.25;0.9;0.25\" sc-camel-key-times=\"0;0.85;0.92;1\"><\u002Fanimate>\n        <\u002Frect>\n        <circle cx=\"1445\" cy=\"352\" r=\"6\" fill=\"#9DE84B\"><\u002Fcircle>\n        <text x=\"1445\" y=\"400\" text-anchor=\"middle\" font-family=\"Space Mono, monospace\" font-size=\"26\" fill=\"#9DE84B\">receiver<\u002Ftext>\n      <\u002Fg>\n    <\u002Fsvg>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"A Map of the Airwaves\" data-screen-label=\"10 Bands\" data-speaker-notes=\"Give them a mental map of the spectrum without a physics lecture. It's a shared public resource, sliced into bands and regulated so signals don't stomp on each other. Anchor with familiar landmarks: FM radio and walkie-talkies live low and reach far; Wi-Fi lives high, moves tons of data, but barely leaves the room; your microwave oven is up there too. Our radios deliberately sit in a quiet, low, license-free band — trading data-rate for enormous range, exactly the trade-off from the last slide. The slogan: low and slow wins distance. IMPORTANT delivery note: do NOT say the word LoRa yet — the name is the reveal two slides from now, after the personal story lands harder.\" style=\"box-sizing:border-box;padding:80px 110px 70px;background:#0E0A18;color:#ECE6F4;font-family:'Space Grotesk',sans-serif;display:flex;flex-direction:column;overflow:hidden;\">\n  <div style=\"font-family:'Space Mono',monospace;font-size:24px;letter-spacing:4px;color:#9DE84B;margin-bottom:20px;\">// 10 · THE SPECTRUM<\u002Fdiv>\n  <h2 style=\"font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:72px;line-height:1.0;margin:0;\">Low and slow wins distance<\u002Fh2>\n  <p style=\"font-size:32px;line-height:1.4;color:#9A8BB2;margin:26px 0 0;max-width:1300px;\">Every kind of signal has its own place on the dial. Here's where they sit — and the quiet spot where <span style=\"color:#9DE84B;\">our little radios<\u002Fspan> live.<\u002Fp>\n  <div style=\"flex:1;margin-top:26px;background:#150E26;border:1px solid rgba(255,255,255,.07);border-radius:16px;position:relative;overflow:hidden;\">\n    <svg sc-camel-view-box=\"0 0 1560 520\" width=\"100%\" height=\"100%\" sc-camel-preserve-aspect-ratio=\"xMidYMid meet\" style=\"position:absolute;inset:0;\">\n      <!-- band cards, each with its own wave squiggle (frequency rises left to right) -->\n      <!-- Walkie-Talkie -->\n      <g class=\"band-am\" style=\"transform:translate(-20px,0);\">\n        <rect x=\"60\" y=\"120\" width=\"200\" height=\"240\" rx=\"14\" fill=\"#1A1230\" stroke=\"#3A2D52\" stroke-width=\"2\"><\u002Frect>\n        <path d=\"M 85 240 q 37 -60 75 0 t 75 0\" fill=\"none\" stroke=\"#6B5B86\" stroke-width=\"4\" stroke-dasharray=\"10 8\" style=\"animation:dashmove 4s linear infinite;\"><\u002Fpath>\n        <text x=\"160\" y=\"310\" text-anchor=\"middle\" font-family=\"Chakra Petch, sans-serif\" font-size=\"28\" fill=\"#C9BEDA\">Submarine<\u002Ftext>\n        <text x=\"160\" y=\"344\" text-anchor=\"middle\" font-family=\"Space Mono, monospace\" font-size=\"24\" fill=\"#6B5B86\">~20 kHz<\u002Ftext>\n      <\u002Fg>\n      <!-- FM -->\n      <g class=\"band-fm\" style=\"transform:translate(-20px,0);\">\n        <rect x=\"290\" y=\"120\" width=\"200\" height=\"240\" rx=\"14\" fill=\"#1A1230\" stroke=\"#4A3A68\" stroke-width=\"2\"><\u002Frect>\n        <path d=\"M 310 240 q 20 -50 40 0 t 40 0 t 40 0 t 40 0\" fill=\"none\" stroke=\"#8A78A8\" stroke-width=\"4\" stroke-dasharray=\"10 8\" style=\"animation:dashmove 3s linear infinite;\"><\u002Fpath>\n        <text x=\"390\" y=\"310\" text-anchor=\"middle\" font-family=\"Chakra Petch, sans-serif\" font-size=\"28\" fill=\"#C9BEDA\">FM Radio<\u002Ftext>\n        <text x=\"390\" y=\"344\" text-anchor=\"middle\" font-family=\"Space Mono, monospace\" font-size=\"24\" fill=\"#6B5B86\">~100 MHz<\u002Ftext>\n      <\u002Fg>\n      <!-- LoRa (hero) — starts the same size as its neighbors, then pops up -->\n      <g>\n        <rect class=\"lora-rect\" x=\"520\" y=\"86\" width=\"240\" height=\"308\" rx=\"14\" fill=\"#18220E\" stroke=\"#9DE84B\" stroke-width=\"3\" style=\"filter:drop-shadow(0 0 24px rgba(157,232,75,.4));\"><\u002Frect>\n        <rect class=\"lora-rect\" x=\"520\" y=\"86\" width=\"240\" height=\"308\" rx=\"14\" fill=\"none\" stroke=\"#9DE84B\" stroke-width=\"3\" opacity=\"0.5\">\n          <animate sc-camel-attribute-name=\"opacity\" begin=\"1.1s\" dur=\"2.4s\" sc-camel-repeat-count=\"indefinite\" values=\"0.5;0.1;0.5\"><\u002Fanimate>\n        <\u002Frect>\n        <path d=\"M 545 240 q 24 -56 48 0 t 48 0 t 48 0 t 48 0\" fill=\"none\" stroke=\"#9DE84B\" stroke-width=\"5\" stroke-dasharray=\"10 8\" style=\"animation:dashmove 2.4s linear infinite;filter:drop-shadow(0 0 6px rgba(157,232,75,.7));\"><\u002Fpath>\n        <text class=\"lora-label\" x=\"640\" y=\"140\" text-anchor=\"middle\" font-family=\"Space Mono, monospace\" font-size=\"26\" fill=\"#9DE84B\">★ we are here<\u002Ftext>\n        <text x=\"640\" y=\"310\" text-anchor=\"middle\" font-family=\"Chakra Petch, sans-serif\" font-size=\"32\" fill=\"#9DE84B\">Our little radios<\u002Ftext>\n        <text x=\"640\" y=\"348\" text-anchor=\"middle\" font-family=\"Space Mono, monospace\" font-size=\"24\" fill=\"#9DE84B\">433/868 MHz<\u002Ftext>\n      <\u002Fg>\n      <!-- Mobile -->\n      <g class=\"band-mobile\" style=\"transform:translate(20px,0);\">\n        <rect x=\"790\" y=\"120\" width=\"200\" height=\"240\" rx=\"14\" fill=\"#1A1230\" stroke=\"#FF8A3D\" stroke-width=\"2\" opacity=\"0.9\"><\u002Frect>\n        <path d=\"M 806 240 q 12 -42 24 0 t 24 0 t 24 0 t 24 0 t 24 0 t 24 0 t 24 0\" fill=\"none\" stroke=\"#FF8A3D\" stroke-width=\"4\" stroke-dasharray=\"8 7\" style=\"animation:dashmove 1.8s linear infinite;\"><\u002Fpath>\n        <text x=\"890\" y=\"310\" text-anchor=\"middle\" font-family=\"Chakra Petch, sans-serif\" font-size=\"28\" fill=\"#C9BEDA\">Mobile 4G/5G<\u002Ftext>\n        <text x=\"890\" y=\"344\" text-anchor=\"middle\" font-family=\"Space Mono, monospace\" font-size=\"24\" fill=\"#6B5B86\">0.7–3.5 GHz<\u002Ftext>\n      <\u002Fg>\n      <!-- WiFi -->\n      <g class=\"band-wifi\" style=\"transform:translate(20px,0);\">\n        <rect x=\"1020\" y=\"120\" width=\"200\" height=\"240\" rx=\"14\" fill=\"#1A1230\" stroke=\"#4FD6FF\" stroke-width=\"2\" opacity=\"0.9\"><\u002Frect>\n        <path d=\"M 1034 240 q 8 -34 16 0 t 16 0 t 16 0 t 16 0 t 16 0 t 16 0 t 16 0 t 16 0 t 16 0 t 16 0 t 16 0\" fill=\"none\" stroke=\"#4FD6FF\" stroke-width=\"4\" stroke-dasharray=\"6 6\" style=\"animation:dashmove 1.2s linear infinite;\"><\u002Fpath>\n        <text x=\"1120\" y=\"310\" text-anchor=\"middle\" font-family=\"Chakra Petch, sans-serif\" font-size=\"28\" fill=\"#C9BEDA\">Wi-Fi<\u002Ftext>\n        <text x=\"1120\" y=\"344\" text-anchor=\"middle\" font-family=\"Space Mono, monospace\" font-size=\"24\" fill=\"#6B5B86\">2.4–5 GHz<\u002Ftext>\n      <\u002Fg>\n      <!-- Light -->\n      <g class=\"band-light\" style=\"transform:translate(20px,0);\">\n        <rect x=\"1250\" y=\"120\" width=\"200\" height=\"240\" rx=\"14\" fill=\"#1A1230\" stroke=\"#C96BFF\" stroke-width=\"2\" opacity=\"0.9\"><\u002Frect>\n        <path d=\"M 1262 240 q 4 -26 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0 t 8 0\" fill=\"none\" stroke=\"#C96BFF\" stroke-width=\"3.5\" stroke-dasharray=\"4 5\" style=\"animation:dashmove 0.8s linear infinite;\"><\u002Fpath>\n        <text x=\"1350\" y=\"310\" text-anchor=\"middle\" font-family=\"Chakra Petch, sans-serif\" font-size=\"28\" fill=\"#C9BEDA\">Visible Light<\u002Ftext>\n        <text x=\"1350\" y=\"344\" text-anchor=\"middle\" font-family=\"Space Mono, monospace\" font-size=\"24\" fill=\"#6B5B86\">~500 THz<\u002Ftext>\n      <\u002Fg>\n      <!-- trade-off axis -->\n      <line x1=\"60\" y1=\"430\" x2=\"1450\" y2=\"430\" stroke=\"rgba(255,255,255,.12)\" stroke-width=\"2\"><\u002Fline>\n      <text x=\"60\" y=\"475\" font-family=\"Space Mono, monospace\" font-size=\"26\" fill=\"#9A8BB2\">← slower waves · <tspan fill=\"#9DE84B\">further range<\u002Ftspan><\u002Ftext>\n      <text x=\"1450\" y=\"475\" text-anchor=\"end\" font-family=\"Space Mono, monospace\" font-size=\"26\" fill=\"#9A8BB2\"><tspan fill=\"#4FD6FF\">more data<\u002Ftspan> · faster waves →<\u002Ftext>\n    <\u002Fsvg>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"How I Found LoRa\" data-screen-label=\"11 IoT Story\" data-speaker-notes=\"Slow down and make it personal — this is the emotional turn of the deck, so drop the teacher voice and just tell it. I wasn't hunting for a festival gadget; I was at home trying to get temperature and soil readings from the far end of the garden back to my desk, and Wi-Fi simply wouldn't reach that far. Digging for a fix, I stumbled on this odd little radio that pushed my sensor readings kilometres on a coin-cell battery — almost no power. The lightbulb moment, and the pivot of the whole talk: if this thing can carry a temperature reading that far, it can carry a text message to my friends across a festival. Let the 'tuning in' animation breathe before the reveal.\" style=\"box-sizing:border-box;padding:90px 110px 80px;background:radial-gradient(130% 120% at 80% 75%, #1B1430 0%, #0E0A18 60%);color:#ECE6F4;font-family:'Space Grotesk',sans-serif;display:flex;flex-direction:column;justify-content:center;overflow:hidden;position:relative;\">\n  <div class=\"tune-static\" aria-hidden=\"true\" style=\"position:absolute;inset:0;z-index:5;pointer-events:none;background:repeating-linear-gradient(0deg, rgba(255,255,255,.35) 0px, rgba(255,255,255,.35) 1px, transparent 1px, transparent 3px), #0E0A18;mix-blend-mode:screen;\"><\u002Fdiv>\n  <div class=\"tune-label\" aria-hidden=\"true\" style=\"position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:6;font-family:'Space Mono',monospace;font-size:32px;letter-spacing:6px;color:#9DE84B;text-shadow:0 0 16px rgba(157,232,75,.7);white-space:nowrap;pointer-events:none;opacity:0;\">// TUNING IN...<\u002Fdiv>\n  <div class=\"tune-content\" style=\"opacity:1;\">\n  <div style=\"font-family:'Space Mono',monospace;font-size:24px;letter-spacing:4px;color:#9DE84B;margin-bottom:28px;\">// 11 · A HAPPY ACCIDENT<\u002Fdiv>\n  <h2 style=\"font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:84px;line-height:1.02;margin:0;max-width:1500px;\">I wasn't looking for this<\u002Fh2>\n  <p style=\"font-size:38px;line-height:1.42;color:#C9BEDA;margin:40px 0 0;max-width:1320px;\">I was playing with <span style=\"color:#ECE6F4;\">tiny computer chips<\u002Fspan> — the size of a stamp — trying to send data from a sensor in the garden to my desk. Wi-Fi could not reach that far.<\u002Fp>\n  <div style=\"display:flex;align-items:center;gap:36px;margin-top:52px;max-width:1400px;\">\n    <div style=\"flex:1;background:#1A1230;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:34px 38px;\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:24px;color:#4FD6FF;margin-bottom:14px;\">THE EXPERIMENT<\u002Fdiv>\n      <div style=\"font-size:30px;line-height:1.4;color:#C9BEDA;\">A strange little radio carried my sensor data <span style=\"color:#ECE6F4;\">for kilometres<\u002Fspan> — on a tiny battery.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-family:'Chakra Petch',sans-serif;font-size:56px;color:#9DE84B;flex:0 0 auto;\">→<\u002Fdiv>\n    <div style=\"flex:1;background:#18220E;border:1px solid rgba(157,232,75,.3);border-radius:16px;padding:34px 38px;\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:24px;color:#9DE84B;margin-bottom:14px;\">THE REALIZATION<\u002Fdiv>\n      <div style=\"font-size:30px;line-height:1.4;color:#ECE6F4;\">If it can carry sensor data that far… <span style=\"color:#9DE84B;\">it can carry our messages too.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"LoRa: Small Messages, Very Far\" data-screen-label=\"12 LoRa\" data-speaker-notes=\"The reveal — say the name with a little weight: LoRa, short for Long Range. It's the technology behind that quiet low band. Frame the trade honestly and then flip it into a feature: it sends only a trickle of data — text, coordinates, tiny status pings — but it does it astonishingly far on almost nothing. Battery life story: a small cell lasts days; add low-power sleep or a matchbox solar panel and it runs for weeks or indefinitely. Reframe the limitation: text-only is the point, not a compromise — small messages are exactly what go the distance, and text is all you need to find your people. Then the responsible-adult note: the legal band and power limits are set by regulation and vary by country (EU uses 868 MHz, the US 915 MHz) — check your local rules before you transmit.\" style=\"box-sizing:border-box;padding:80px 110px 70px;background:#0E0A18;color:#ECE6F4;font-family:'Space Grotesk',sans-serif;display:flex;flex-direction:column;justify-content:center;overflow:hidden;\">\n  <div style=\"font-family:'Space Mono',monospace;font-size:24px;letter-spacing:4px;color:#9DE84B;margin-bottom:20px;\">// 12 · THE SECRET INGREDIENT<\u002Fdiv>\n  <h2 style=\"font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:72px;line-height:1.0;margin:0;\">LoRa: small messages, very far<\u002Fh2>\n  <p style=\"font-size:36px;line-height:1.4;color:#C9BEDA;margin:30px 0 0;max-width:1320px;\">That quiet spot has a name: <span style=\"color:#9DE84B;\">Lo<\u002Fspan>ng <span style=\"color:#9DE84B;\">Ra<\u002Fspan>nge radio. A tiny bit of data — just text — sent for kilometres on almost no power.<\u002Fp>\n\n  <div style=\"display:flex;gap:28px;margin-top:48px;\">\n    <div style=\"flex:1;background:#1A1230;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:36px 32px;text-align:center;\">\n      <div style=\"font-family:'Chakra Petch',sans-serif;font-size:64px;color:#9DE84B;line-height:1;\">2–10<span style=\"font-size:32px;color:#9A8BB2;\"> km<\u002Fspan><\u002Fdiv>\n      <div style=\"font-size:28px;color:#C9BEDA;margin-top:14px;\">from one device to the next<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;background:#1A1230;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:36px 32px;text-align:center;\">\n      <div style=\"font-family:'Chakra Petch',sans-serif;font-size:64px;color:#FF8A3D;line-height:1;\">days<\u002Fdiv>\n      <div style=\"font-size:28px;color:#C9BEDA;margin-top:14px;\">on a small battery — weeks with low-power mode or a little solar panel<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;background:#1A1230;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:36px 32px;text-align:center;\">\n      <div style=\"font-family:'Chakra Petch',sans-serif;font-size:64px;color:#4FD6FF;line-height:1;\">text<\u002Fdiv>\n      <div style=\"font-size:28px;color:#C9BEDA;margin-top:14px;\">only — and that's the point<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin-top:40px;background:#150E26;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:30px 40px;font-size:32px;line-height:1.4;color:#ECE6F4;\">No photos, no video, no endless scrolling. <span style=\"color:#9A8BB2;\">One look tells you what you need — then the phone goes back in the pocket. You save time, and you stay at the festival.<\u002Fspan><\u002Fdiv>\n  <div style=\"margin-top:20px;font-family:'Space Mono',monospace;font-size:20px;color:#7E7090;\">Bands and max power are set by regulation and differ by country — check your local rules.<\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"How LoRa Reaches\" data-screen-label=\"13 Chirp\" data-speaker-notes=\"Go one level deeper for the curious — this is the 'how does it actually work' payoff, and it sets up the 254 km record next: chirp first, proof after. LoRa's secret is Chirp Spread Spectrum (CSS): instead of holding a steady tone, each bit is sent as a chirp — a signal that sweeps smoothly up or down across the whole band, exactly like a bird's chirp or a slide whistle. The funny coincidence worth pointing out: it's literally called a 'chirp', so our festival radios quite literally sing to each other like birds across the forest. Why it was chosen: a chirp is incredibly robust. The receiver knows the exact shape of the sweep it's listening for, so it can pull the chirp out of the noise even when the signal is far weaker than the background hiss — that's how it reaches kilometres on milliwatts. Chirps also shrug off interference, reflections and doppler shift (a device moving in a crowd), because a little distortion still leaves the sweep recognisable. It's the same principle bats and radar use to measure distance. Bottom line: the chirp is why a coin-cell radio can shout across a valley. Fun fact — the technique was patented by a French startup, Cycleo, bought by Semtech.\" style=\"box-sizing:border-box;padding:80px 110px 70px;background:radial-gradient(120% 130% at 15% 20%, #1B1430 0%, #0E0A18 60%);color:#ECE6F4;font-family:'Space Grotesk',sans-serif;display:flex;flex-direction:column;overflow:hidden;\">\n  <div style=\"font-family:'Space Mono',monospace;font-size:24px;letter-spacing:4px;color:#9DE84B;margin-bottom:20px;\">// 13 · GOING DEEPER<\u002Fdiv>\n  <h2 style=\"font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:72px;line-height:1.0;margin:0;\">It talks in <span style=\"color:#9DE84B;\">chirps<\u002Fspan><\u002Fh2>\n  <p style=\"font-size:34px;line-height:1.4;color:#C9BEDA;margin:26px 0 0;max-width:1400px;\">LoRa = <span style=\"color:#ECE6F4;\">Chirp Spread Spectrum<\u002Fspan>. Every bit is sent as a chirp — a tone sweeping across the band, exactly like a bird's call or a slide whistle. <span style=\"color:#9DE84B;\">Our radios literally sing to each other.<\u002Fspan><\u002Fp>\n  <div style=\"display:flex;gap:28px;margin-top:36px;flex:1;\">\n    <div style=\"flex:1;background:#150E26;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:34px 38px;display:flex;flex-direction:column;\">\n      <div style=\"font-family:'Chakra Petch',sans-serif;font-size:36px;color:#4FD6FF;margin-bottom:14px;\">Hears through noise<\u002Fdiv>\n      <div style=\"font-size:27px;line-height:1.4;c
